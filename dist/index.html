  <script>
// Phase 1.A — pre-paint theme application. Inlined in <head> BEFORE the
// stylesheet so the correct theme attribute is set when the first paint
// reads CSS custom properties (no FOUC).
(function () {
  try {
    var saved = localStorage.getItem('gitcite:theme');
    var system = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    var theme = (saved === 'light' || saved === 'dark') ? saved : system;
    document.documentElement.setAttribute('data-theme', theme);
  } catch (_) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();
</script>

/* Phase 1.A — color tokens, theme system, motion preference (DESIGN_SPEC §13.5).
   AAA targets enforced by tools/contrast-audit.mjs in CI:
     - body text >= 7:1 vs every background it appears on (1.4.6 AAA)
     - non-text/UI >= 3:1 (1.4.11)
     - focus ring >= 3:1 against both adjacent surfaces (2.4.13) */

:root {
  color-scheme: light dark;
  --focus-ring-width: 2px;
  --focus-ring-offset: 2px;
}

:root[data-theme="light"] {
  --bg: #ffffff;
  --bg-elevated: #f4f4f5;
  --bg-sunken: #e4e4e7;
  --fg: #18181b;
  --fg-muted: #3f3f46;
  --border: #52525b;
  --accent: #1e3a8a;
  --accent-fg: #ffffff;
  --danger: #991b1b;
  --danger-fg: #ffffff;
  --success: #14532d;
  --success-fg: #ffffff;
  --warning: #713f12;
  --warning-fg: #ffffff;
  --focus-ring: #1e40af;
}

:root[data-theme="dark"] {
  --bg: #0a0a0b;
  --bg-elevated: #18181b;
  --bg-sunken: #050506;
  --fg: #fafafa;
  --fg-muted: #d4d4d8;
  --border: #a1a1aa;
  --accent: #bfdbfe;
  --accent-fg: #0a0a0b;
  --danger: #fecaca;
  --danger-fg: #0a0a0b;
  --success: #bbf7d0;
  --success-fg: #0a0a0b;
  --warning: #fde68a;
  --warning-fg: #0a0a0b;
  --focus-ring: #bfdbfe;
}

/* Hard-contrast backstop. If any token is below 7:1 in its base form, override
   here to push it above. Currently every base token already passes; this block
   is the WCAG 2.2 AAA escape hatch (1.4.6) for any token added later that
   cannot reach 7:1. */
@media (prefers-contrast: more) {
  :root[data-theme="light"] {
    --border: #18181b;
    --focus-ring: #000000;
  }
  :root[data-theme="dark"] {
    --border: #fafafa;
    --focus-ring: #ffffff;
  }
}

/* Reduced motion — flatten every transition and animation globally (2.3.3).
   Decorative-only effects must not animate. Functional motion (e.g.,
   virtual-list scroll smoothing) is also flattened — see ambiguity A1 in the
   plan. */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0s !important;
    scroll-behavior: auto !important;
  }
}

/* Base body styling — minimal in Phase 1.A; component CSS lands per phase. */
html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  margin: 0;
}

/* Skip link — visible on focus only. Always reachable for keyboard users. */
.skip-link {
  position: absolute;
  left: -9999px;
  top: 0;
  background: var(--bg);
  color: var(--fg);
  padding: 0.75rem 1rem;
  text-decoration: underline;
  z-index: 9999;
}
.skip-link:focus {
  left: 0.5rem;
  top: 0.5rem;
}

/* Focus appearance — >= 2 CSS px ring, >= 3:1 contrast (2.4.13).
   :focus-visible only so mouse clicks do not show the ring. */
:focus-visible {
  outline: var(--focus-ring-width) solid var(--focus-ring);
  outline-offset: var(--focus-ring-offset);
}

/* Theme toggle styling — header sun/moon button. Phase 1.A delivers a
   text-only button; iconography lands later. */
.theme-toggle {
  background: var(--bg-elevated);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.5rem 0.75rem;
  font-size: 1rem;
  cursor: pointer;
  min-block-size: 44px;
  min-inline-size: 44px;
}
.theme-toggle:hover {
  background: var(--bg-sunken);
}

/* Phase 17 #10 — visible "active view" marker on the toolbar button
   whose view is currently rendered. aria-current="page" supplies the
   semantic; the bottom border + bold weight supply the visual cue.
   Contrast is preserved by using --focus-ring (3:1+ in both themes). */
[role="toolbar"] [data-toolbar-item][aria-current="page"] {
  font-weight: 700;
  box-shadow: inset 0 -3px 0 var(--focus-ring);
}

/* .gitcite-sr-h1 lives in hit-area.css (single source of truth — the

  <script>
// Phase 1.J ids registry. Mints unique ids and audits aria-* references.
//
// Public API (globalThis.GitCiteIds):
//   next(prefix)            — unique id ('field-1', 'field-2', ...)
//   assertResolves(root)    — { dangling: [{ el, attr, value }] }

(function () {
  'use strict';

  if (globalThis.GitCiteIds) return;

  const counters = Object.create(null);

  function next(prefix) {
    const safe = String(prefix || 'gitcite').replace(/[^a-zA-Z0-9_-]/g, '');
    counters[safe] = (counters[safe] || 0) + 1;
    return `${safe}-${counters[safe]}`;
  }

  const REF_ATTRS = ['aria-controls', 'aria-labelledby', 'aria-describedby', 'aria-details'];

  function assertResolves(root) {
    const r = root || document;
    const dangling = [];
    for (const attr of REF_ATTRS) {
      const els = r.querySelectorAll(`[${attr}]`);
      els.forEach((el) => {
        const value = el.getAttribute(attr);
        if (!value) return;
        const tokens = value.trim().split(/\s+/);
        const missing = tokens.filter((t) => !document.getElementById(t));
        if (missing.length > 0) {
          dangling.push({ el, attr, value, missing });
        }
      });
    }
    return { dangling };
  }

  globalThis.GitCiteIds = { next, assertResolves };
})();
</script>
  <script>
// Phase 1.B focusUtils — focus management helpers consumed by every later
// phase. AAA criteria: 2.4.3 (Focus Order), 2.4.7 (Focus Visible),
// 2.4.11/2.4.12 (Focus Not Obscured), 2.4.13 (Focus Appearance).
//
// Public API (globalThis.GitCiteFocus):
//   getFocusable(root)        — array of tabbable elements in document order
//   trapFocus(root)           — install a Tab/Shift+Tab wraparound trap;
//                               returns { release() }
//   restoreFocusTo(element)   — focus the saved opener (no-op on detached)
//   moveFocusSafely(target,   — focus target if focusable, else walk the
//                   fallback)   fallback chain; never lands on document.body

(function () {
  'use strict';

  const FOCUSABLE_SELECTOR = [
    'a[href]',
    'area[href]',
    'button',
    'input',
    'select',
    'textarea',
    'iframe',
    'audio[controls]',
    'video[controls]',
    'summary',
    '[contenteditable]:not([contenteditable="false"])',
    '[tabindex]',
  ].join(',');

  function isVisible(el) {
    if (!el || el.hasAttribute('hidden')) return false;
    if (el.getAttribute('aria-hidden') === 'true') return false;
    // jsdom does not implement getClientRects fully; rely on style + attrs
    const style = el.ownerDocument.defaultView.getComputedStyle(el);
    if (style.display === 'none' || style.visibility === 'hidden') return false;
    return true;
  }

  function isFocusable(el) {
    if (!el || !el.matches) return false;
    if (!el.matches(FOCUSABLE_SELECTOR)) return false;
    if (el.hasAttribute('disabled')) return false;
    if (el.getAttribute('aria-hidden') === 'true') return false;
    if (el.getAttribute('tabindex') === '-1') return false;
    if (!isVisible(el)) return false;
    // Walk ancestors for hidden / aria-hidden parents
    let p = el.parentElement;
    while (p) {
      if (p.hasAttribute('hidden')) return false;
      if (p.getAttribute('aria-hidden') === 'true') return false;
      p = p.parentElement;
    }
    return true;
  }

  function getFocusable(root) {
    if (!root) return [];
    const all = root.querySelectorAll(FOCUSABLE_SELECTOR);
    const out = [];
    for (let i = 0; i < all.length; i++) {
      if (isFocusable(all[i])) out.push(all[i]);
    }
    return out;
  }

  function restoreFocusTo(element) {
    try {
      if (element && typeof element.focus === 'function' && element.isConnected) {
        element.focus();
      }
    } catch (_) {}
  }

  function moveFocusSafely(target, fallback) {
    const candidates = [target].concat(Array.isArray(fallback) ? fallback : [fallback]);
    for (let i = 0; i < candidates.length; i++) {
      const el = candidates[i];
      if (el && typeof el.focus === 'function' && el.isConnected && isFocusable(el)) {
        el.focus();
        return true;
      }
    }
    return false;
  }

  function trapFocus(root) {
    if (!root) return { release() {} };
    function onKeydown(e) {
      if (e.key !== 'Tab') return;
      const items = getFocusable(root);
      if (items.length === 0) {
        e.preventDefault();
        return;
      }
      const active = root.ownerDocument.activeElement;
      const first = items[0];
      const last = items[items.length - 1];
      if (e.shiftKey && active === first) {
        last.focus();
        e.preventDefault();
      } else if (!e.shiftKey && active === last) {
        first.focus();
        e.preventDefault();
      }
    }
    root.addEventListener('keydown', onKeydown);
    return {
      release() {
        root.removeEventListener('keydown', onKeydown);
      },
    };
  }

  globalThis.GitCiteFocus = {
    getFocusable,
    trapFocus,
    restoreFocusTo,
    moveFocusSafely,
    isFocusable,
  };
})();
</script>
  <script>
// Phase 1.C announce — singleton live regions consumed by every later phase.
// WCAG 4.1.3 (Status Messages), 2.2.4 (Interruptions). Discipline rule:
// every later feature must announce through this module — no ad-hoc
// aria-live regions in views/.
//
// Public API (globalThis.GitCiteAnnounce):
//   polite(text)    — write to the polite region; throttled per-message 500ms
//   assertive(text) — write to the assertive region; throttled per-message
//   once(text)      — write once, then set aria-live=off so re-renders never
//                     re-announce the same value (used by the OAuth user
//                     code in §14.2 — DESIGN_SPEC §14.2 hotspot H3)

(function () {
  'use strict';

  if (globalThis.GitCiteAnnounce) return;

  const SR_ONLY_STYLE = [
    'position:absolute',
    'width:1px',
    'height:1px',
    'padding:0',
    'margin:-1px',
    'overflow:hidden',
    'clip:rect(0,0,0,0)',
    'white-space:nowrap',
    'border:0',
  ].join(';');

  function ensureRegion(kind, role, live) {
    let node = document.querySelector(`[data-announce="${kind}"]`);
    if (!node) {
      node = document.createElement('div');
      node.setAttribute('data-announce', kind);
      node.setAttribute('aria-live', live);
      node.setAttribute('aria-atomic', 'true');
      node.setAttribute('role', role);
      node.style.cssText = SR_ONLY_STYLE;
      document.body.appendChild(node);
    }
    return node;
  }

  function getOrCreateRegions() {
    return {
      polite: ensureRegion('polite', 'status', 'polite'),
      assertive: ensureRegion('assertive', 'alert', 'assertive'),
    };
  }

  // Throttle: { 'polite|hello': lastWriteMs }
  const lastWrite = new Map();
  const THROTTLE_MS = 500;

  function write(region, kind, text) {
    if (!text) return;
    const key = kind + '|' + text;
    const now = Date.now();
    const prev = lastWrite.get(key) || 0;
    if (now - prev < THROTTLE_MS) return;
    lastWrite.set(key, now);
    region.textContent = text;
  }

  function polite(text) {
    write(getOrCreateRegions().polite, 'polite', text);
  }

  function assertive(text) {
    write(getOrCreateRegions().assertive, 'assertive', text);
  }

  // once() uses a separate region so the polite/assertive regions are not
  // muted globally. A new region is mounted (or re-armed) for each call.
  function once(text) {
    if (!text) return;
    let region = document.querySelector('[data-announce="once"]');
    if (!region) {
      region = document.createElement('div');
      region.setAttribute('data-announce', 'once');
      region.setAttribute('aria-atomic', 'true');
      region.setAttribute('role', 'status');
      region.style.cssText = SR_ONLY_STYLE;
      document.body.appendChild(region);
    }
    region.setAttribute('aria-live', 'polite');
    region.textContent = text;
    // Mute on next microtask so subsequent re-renders or polls don't re-fire.
    setTimeout(() => {
      region.setAttribute('aria-live', 'off');
    }, 0);
  }

  // Mount regions immediately so first call is synchronous.
  if (document.body) {
    getOrCreateRegions();
  } else {
    document.addEventListener('DOMContentLoaded', getOrCreateRegions);
  }

  globalThis.GitCiteAnnounce = { polite, assertive, once };
})();
</script>
  <script>
// Phase 1.D Dialog primitive — native <dialog> wrapper with focus trap,
// Escape close, focus restore, alertdialog mode. Consumed by every modal
// across the app. WCAG 2.1.2, 2.4.3, 3.2.2.
//
// Public API (globalThis.GitCiteDialog):
//   open({ title, content, role, initialFocus, describedById, escapeCloses,
//          backdropCloses, onClose }) → { close }

(function () {
  'use strict';

  let idCounter = 0;
  function nextId(prefix) {
    return `${prefix}-${++idCounter}`;
  }

  function open(opts) {
    opts = opts || {};
    const role = opts.role || 'dialog';
    const escapeCloses = opts.escapeCloses !== false;
    const backdropCloses = opts.backdropCloses === true;
    const opener = document.activeElement;

    const dialog = document.createElement('dialog');
    dialog.setAttribute('data-gitcite-dialog', '');
    dialog.setAttribute('aria-modal', 'true');
    dialog.setAttribute('role', role);

    // Phase 18 #1 — header row contains the title heading and a real
    // visible Close button. Every dialog gets one for free so users
    // never have to hunt for an in-body Cancel / Close.
    const headerBar = document.createElement('div');
    headerBar.setAttribute('data-gitcite-dialog-header', '');
    headerBar.style.cssText = 'display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;';

    const titleId = nextId('gitcite-dialog-title');
    const heading = document.createElement('h2');
    heading.id = titleId;
    heading.textContent = opts.title || '';
    heading.style.cssText = 'margin:0;flex:1 1 auto;';
    headerBar.appendChild(heading);
    dialog.setAttribute('aria-labelledby', titleId);

    // alertdialog suppresses the close X — those flows have an explicit
    // "Cancel" / "Confirm" button pair and dismissing via X would skip
    // the user's deliberate choice. Caller can opt back in via showClose.
    const showClose = (opts.showClose === true) || (role !== 'alertdialog');
    let closeX = null;
    if (showClose) {
      closeX = document.createElement('button');
      closeX.type = 'button';
      closeX.setAttribute('data-gitcite-dialog-close', '');

//
// Public API (globalThis.GitCiteFilter):
//   applyFilters(entries, criteria) → filtered list (AND semantics)
//   yearOverlap(dateRangeOrYear, from, to) → boolean
//   listEntryTypes(entries) → [{ value, count }]
//   listJEL(entries) → [{ value, count }]

// Phase 13 Edit 4 — undo stack.
//
// Backs the simple-confirm + 30 s undo toast pattern that replaces
// the typed-confirmation for delete. Each push records an id (used
// to look the entry up from the toast's Undo button) and an undo()
// thunk. WCAG 3.3.4 / 3.3.6 stay "met" because reversibility lives
// in undo plus the persistent .bib download fallback.
//
// Public API (globalThis.GitCiteUndo):
//   push({ id, undo, label? })  — record a reversible action
//   runById(id)                 — invoke + remove
//   expire(id)                  — drop without invoking (toast fade)
//   latest()                    — the most recent entry
//   size()                      — number of entries
//   clear()                     — drop everything

(function () {
  'use strict';

  if (globalThis.GitCiteUndo) return;

  const stack = [];

  function push(entry) {
    if (!entry || !entry.id || typeof entry.undo !== 'function') return;
    stack.push(entry);
  }

  function runById(id) {
    const i = stack.findIndex((e) => e.id === id);
    if (i < 0) return;
    const entry = stack[i];
    stack.splice(i, 1);
    try { entry.undo(); } catch (_) {}
  }

  function expire(id) {
    const i = stack.findIndex((e) => e.id === id);
    if (i >= 0) stack.splice(i, 1);
  }

  function latest() { return stack[stack.length - 1] || null; }
  function size() { return stack.length; }
  function clear() { stack.length = 0; }

// Phase 16 #13 — File System Access bridge.
//
// "Live-linked library file" — when supported (showOpenFilePicker /
// showSaveFilePicker), GitCite holds a FileSystemFileHandle that points
// at the user's local .bib file. Subsequent saves write through the
// handle so the file on disk and the in-app model stay in sync without
// the user re-picking a destination.
//
// Persistence: the handle is stored in IndexedDB ("gitcite-fs" / "handles"
// / key="library"). Browsers preserve the handle across sessions but
// require an explicit user gesture to grant read/write permission on
// each new origin / each new session, so reconnect() is exposed for
// callers to wire to a button.
//
// Fallback: when showOpenFilePicker / showSaveFilePicker are unavailable
// (Firefox, older Safari), open() falls back to a hidden <input
// type="file"> and create() falls back to a download — both ingest-only;
// no live link is established. The caller can detect this via the
// `live: false` flag on the returned record.
//
// API:
//   isSupported()                    → bool
//   open()                           → { handle, text, name, live }
//   create(name, text)               → { handle, name, live }
//   save(handle, text)               → void                          (throws on permission revoked)
//   persistHandle(handle)            → Promise<void>
//   restoreHandle()                  → Promise<FileSystemFileHandle | null>
//   ensurePermission(handle, mode)   → Promise<bool>
//   clearPersisted()                 → Promise<void>

  if (globalThis.GitCiteFileBridge) return;

  const DB_NAME = 'gitcite-fs';
  const STORE = 'handles';
  const HANDLE_KEY = 'library';

  function isSupported() {
    return typeof globalThis.showOpenFilePicker === 'function'

    return new Promise((resolve, reject) => {
      if (typeof indexedDB === 'undefined') return resolve(null);
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function persistHandle(handle) {
    const db = await openDb();
    if (!db) return;
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(handle, HANDLE_KEY);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);

  async function restoreHandle() {
    const db = await openDb();
    if (!db) return null;
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(HANDLE_KEY);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });

  async function clearPersisted() {
    const db = await openDb();
    if (!db) return;
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(HANDLE_KEY);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);

      err.code = 'no-handle';

    }
  }

    isSupported, open, create, save,
    persistHandle, restoreHandle, ensurePermission, clearPersisted,

})();

// Phase 2 — unsaved-changes pill. DESIGN_SPEC §5.3.
//
// Pill is a real <button aria-label="N unsaved changes — review"> with
// disclosure semantics (aria-expanded). Clicking opens a list of buffered
// edits; each row's Discard button uses aria-describedby to associate the
// citation key so SRs hear "Discard, smith:2024:cities" not just "Discard".
//
// Public API (globalThis.GitCitePill):
//   mount(host, opts)               — mount once into a host element
//   update({ count, items })        — re-render with the latest buffer

      _btn.setAttribute('aria-label', `${count} unsaved changes — review`);
      _btn.textContent = `${count} unsaved`;

  if (globalThis.GitCiteMappingDialog) return;

  // Standard BibTeX fields exposed in the per-row <select>.
  const FIELD_OPTIONS = [
    { value: '', label: '— do not import —' },
    { value: '__type__', label: 'Entry type' },
    { value: 'author', label: 'author' },
    { value: 'editor', label: 'editor' },
    { value: 'title', label: 'title' },
    { value: 'booktitle', label: 'booktitle' },
    { value: 'journal', label: 'journal' },
    { value: 'year', label: 'year' },
    { value: 'volume', label: 'volume' },
    { value: 'number', label: 'number' },
    { value: 'pages', label: 'pages' },
    { value: 'edition', label: 'edition' },
    { value: 'publisher', label: 'publisher' },
    { value: 'address', label: 'address' },
    { value: 'doi', label: 'doi' },
    { value: 'isbn', label: 'isbn' },
    { value: 'issn', label: 'issn' },
    { value: 'url', label: 'url' },
    { value: 'abstract', label: 'abstract' },
    { value: 'keywords', label: 'keywords' },

    opts = opts || {};
    const headers = opts.headers || [];
    const sample = opts.sampleRow || [];
    const ids = globalThis.GitCiteIds;
    const Csv = globalThis.GitCiteCsv;
    const Dialog = globalThis.GitCiteDialog;
    const Bibtex = globalThis.GitCiteBibtex;

    const form = document.createElement('form');
    form.setAttribute('data-mapping-form', '');
    form.addEventListener('submit', (e) => e.preventDefault());

    const errorSlot = document.createElement('div');
    errorSlot.setAttribute('data-mapping-errors', '');
    form.appendChild(errorSlot);

    headers.forEach((h, i) => {
      const fs = document.createElement('fieldset');
      fs.setAttribute('data-mapping-row', '');
      fs.id = ids ? ids.next('mapping-row') : `mapping-row-${i}`;
      const legend = document.createElement('legend');
      legend.textContent = `Column ${i + 1}: ${h}`;
      fs.appendChild(legend);

      const auto = Csv ? Csv.normaliseHeader(h) : null;
      const selectId = ids ? ids.next('mapping-select') : `mapping-select-${i}`;
      const sampleId = ids ? ids.next('mapping-sample') : `mapping-sample-${i}`;

      const label = document.createElement('label');
      label.setAttribute('for', selectId);
      label.textContent = `Map to`;
      fs.appendChild(label);

      const select = document.createElement('select');
      select.id = selectId;
      select.setAttribute('data-mapping-target', '');
      select.setAttribute('data-source-header', h);
      select.setAttribute('aria-describedby', sampleId);

    submit.type = 'button';
    submit.setAttribute('data-mapping-submit', '');
    submit.textContent = 'Import';
    submit.style.cssText = 'min-block-size:44px;min-inline-size:44px;';

    const cancel = document.createElement('button');
    cancel.type = 'button';
    cancel.setAttribute('data-mapping-cancel', '');
    cancel.textContent = 'Cancel';
    cancel.style.cssText = 'min-block-size:44px;min-inline-size:44px;margin-left:0.5rem;';

      errorSlot.innerHTML = '';

      const seen = new Map();
      const dupes = [];

        const list = document.createElement('ul');
        for (const d of dupes) {

          for (const id of d.ids) {
            const a = document.createElement('a');
            a.href = '#' + id;

      const mapping = {};

      if (typeof opts.onImport === 'function') opts.onImport(entries);
    });
  }

// Phase 3 — export. DESIGN_SPEC §7.3 + §7.4 (File System Access write-back).
//
// Public API (globalThis.GitCiteExport):
//   download(filename, text)        — fallback download via blob URL
//   saveToFile(filename, text)      — File System Access if available, else
//                                      falls back to download()

(function () {
  'use strict';

  if (globalThis.GitCiteExport) return;

  let _handle = null;

  function download(filename, text) {
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(url);
      a.remove();
    }, 0);
  }

  async function saveToFile(filename, text) {
    if (!window.showSaveFilePicker) {
      return download(filename, text);
    }
    try {
      if (!_handle) {
        _handle = await window.showSaveFilePicker({
          suggestedName: filename,
          types: [{ description: 'BibTeX', accept: { 'text/plain': ['.bib'] } }],
        });
      }
      const writable = await _handle.createWritable();
      await writable.write(text);
      await writable.close();
    } catch (e) {
      // User cancelled or no permission — fall back to download.
      download(filename, text);
    }
  }

  globalThis.GitCiteExport = { download, saveToFile };
})();
</script>

    employment: [['J2', 3]],
    unemployment: [['J6', 3]],
    labor: [['J0', 2]],
    wage: [['J3', 2]],
    health: [['I1', 3]],

    poverty: [['I3', 2]],

  <script>
// Phase 13 Edit 3 — row action dialog with edit/duplicate morph.
//
// Pressing Enter on a grid row opens this modal dialog. The dialog
// has four "modes" rendered into the same <dialog> body:
//   - menu          (default)  Open detail / Edit / Duplicate / Delete / Close
//   - edit          Inline edit form (Cancel returns to menu)
//   - duplicate     Inline form pre-filled with collision-suffixed key
//   - deleteConfirm <alertdialog> sub-step
// The dialog only fully closes on Open detail / Close / Save / confirmed Delete.
// WCAG 2.1.2, 2.4.3, 3.2.2, 4.1.2, 4.1.3.
//
// Public API (globalThis.GitCiteRowAction):
//   open(entry, { onOpen, onEdit, onDuplicate, onDelete })

(function () {
  'use strict';

  if (globalThis.GitCiteRowAction) return;

  function ids() { return globalThis.GitCiteIds; }
  function nextId(prefix) {
    return ids() ? ids().next(prefix) : prefix + '-' + Math.random().toString(36).slice(2, 8);
  }

  function open(entry, opts) {
    opts = opts || {};
    const Dialog = globalThis.GitCiteDialog;
    if (!Dialog) return null;

    const handle = Dialog.open({
      title: entryHeading(entry),
      content: '',
    });
    const dialog = handle.dialog;
    const body = dialog.querySelector('.gitcite-dialog-body');

    // The dialog primitive already inserted a heading; we manage our own
    // so aria-labelledby can retarget cleanly between modes.
    const existingTitleId = dialog.getAttribute('aria-labelledby');
    const existingTitle = existingTitleId ? document.getElementById(existingTitleId) : null;
    if (existingTitle) existingTitle.remove();

    let lastMenuFocusLabel = 'Open detail';

    function setLabelledBy(headingId) {
      dialog.setAttribute('aria-labelledby', headingId);
    }

    function clear() { body.innerHTML = ''; }

    function setDialogRole(role) {
      // Phase 13 a11y review (C3): the delete-confirm sub-step
      // becomes role="alertdialog"; the menu/edit/duplicate modes
      // use the default dialog role.
      dialog.setAttribute('role', role);
    }

    function showMenu() {
      clear();
      setDialogRole('dialog');
      const titleId = nextId('row-action-title');
      const h = document.createElement('h2');
      h.id = titleId;
      h.textContent = entryHeading(entry);
      body.appendChild(h);
      setLabelledBy(titleId);

      const meta = document.createElement('p');
      const f = entry.fields || {};
      meta.textContent = `${entry.key} · ${f.year || '—'} · ${entry.type || '—'}`;
      meta.style.color = 'var(--fg-muted)';
      body.appendChild(meta);

      const menu = document.createElement('div');
      menu.style.cssText = 'display:flex;flex-wrap:wrap;gap:0.5rem;';

      const buttons = [
        ['Open detail', () => { handle.close(); if (typeof opts.onOpen === 'function') opts.onOpen(entry); }],
        ['Edit', () => { lastMenuFocusLabel = 'Edit'; showEditMorph(false); }],
        ['Duplicate', () => { lastMenuFocusLabel = 'Duplicate'; showEditMorph(true); }],
        ['Delete', () => { lastMenuFocusLabel = 'Delete'; showDeleteConfirm(); }],
        ['Close', () => handle.close()],
      ];
      let firstBtn = null;
      buttons.forEach(([label, onClick]) => {
        const b = document.createElement('button');
        b.type = 'button';
        b.textContent = label;
        b.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
        b.addEventListener('click', onClick);
        menu.appendChild(b);
        if (!firstBtn) firstBtn = b;
      });
      body.appendChild(menu);

      const focusLabel = lastMenuFocusLabel || 'Open detail';
      const target = Array.from(menu.querySelectorAll('button')).find((b) => b.textContent === focusLabel) || firstBtn;
      try { target.focus(); } catch (_) {}
    }

    function showEditMorph(isDuplicate) {
      clear();
      setDialogRole('dialog');
      const seed = isDuplicate ? duplicateEntry(entry) : { ...entry, fields: { ...(entry.fields || {}) } };
      const titleId = nextId('row-action-form-title');
      const h = document.createElement('h2');
      h.id = titleId;
      h.textContent = isDuplicate ? `Duplicate ${entry.key}` : `Edit ${entry.key}`;
      body.appendChild(h);
      setLabelledBy(titleId);

      const form = document.createElement('form');
      form.setAttribute('aria-label', isDuplicate ? 'Duplicate entry form' : 'Edit entry form');
      form.style.cssText = 'display:flex;flex-direction:column;gap:0.5rem;';

      const fields = [
        { name: 'key', label: 'Citation key', value: seed.key, attrs: { 'data-edit-key': '' } },
        { name: 'title', label: 'Title', value: (seed.fields || {}).title || '' },
        { name: 'author', label: 'Author(s)', value: (seed.fields || {}).author || '' },
        { name: 'year', label: 'Year', value: (seed.fields || {}).year || '', inputmode: 'numeric' },
        { name: 'doi', label: 'DOI', value: (seed.fields || {}).doi || '' },
      ];
      let firstInput = null;
      for (const fdef of fields) {
        const wrap = document.createElement('div');
        const id = nextId('rad-field');
        const lbl = document.createElement('label');
        lbl.setAttribute('for', id);
        lbl.textContent = fdef.label;
        const input = document.createElement('input');
        input.id = id;
        input.name = fdef.name;
        input.type = 'text';
        if (fdef.value != null) input.value = fdef.value;
        if (fdef.inputmode) input.setAttribute('inputmode', fdef.inputmode);
        if (fdef.attrs) Object.entries(fdef.attrs).forEach(([k, v]) => input.setAttribute(k, v));
        input.style.cssText = 'min-block-size:44px;width:100%;padding:0.25rem;';
        wrap.appendChild(lbl);
        wrap.appendChild(document.createElement('br'));
        wrap.appendChild(input);
        form.appendChild(wrap);
        if (!firstInput) firstInput = input;
      }

      const actions = document.createElement('div');
      actions.style.cssText = 'display:flex;gap:0.5rem;';
      const save = document.createElement('button');
      save.type = 'submit';
      save.textContent = 'Save';
      save.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
      const cancel = document.createElement('button');
      cancel.type = 'button';
      cancel.textContent = 'Cancel';
      cancel.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
      cancel.addEventListener('click', () => showMenu());
      actions.appendChild(save);
      actions.appendChild(cancel);
      form.appendChild(actions);

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const updated = collectForm(form, seed);
        const cb = isDuplicate ? opts.onDuplicate : opts.onEdit;
        if (typeof cb === 'function') cb(updated);
        handle.close();
      });

      body.appendChild(form);
      try { firstInput.focus(); } catch (_) {}
    }

    function showDeleteConfirm() {
      clear();
      setDialogRole('alertdialog');
      const titleId = nextId('row-action-delete-title');
      const descId = nextId('row-action-delete-desc');
      const h = document.createElement('h2');
      h.id = titleId;
      h.textContent = `Delete ${entry.key}?`;
      body.appendChild(h);
      setLabelledBy(titleId);

      const desc = document.createElement('p');
      desc.id = descId;
      desc.textContent = 'This entry will be removed from your library. You can undo this for 30 seconds.';
      body.appendChild(desc);
      dialog.setAttribute('aria-describedby', descId);

      const actions = document.createElement('div');
      actions.style.cssText = 'display:flex;gap:0.5rem;';
      const cancel = document.createElement('button');
      cancel.type = 'button';
      cancel.textContent = 'Cancel';
      cancel.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
      cancel.addEventListener('click', () => showMenu());
      const confirm = document.createElement('button');
      confirm.type = 'button';
      confirm.textContent = 'Delete entry';
      confirm.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
      confirm.addEventListener('click', () => {
        if (typeof opts.onDelete === 'function') opts.onDelete(entry);
        handle.close();
      });
      actions.appendChild(cancel);
      actions.appendChild(confirm);
      body.appendChild(actions);
      try { cancel.focus(); } catch (_) {}
    }

    showMenu();
    return { close: () => handle.close() };
  }

  function entryHeading(entry) {
    const f = entry.fields || {};
    return f.title || entry.key;
  }

  function duplicateEntry(entry) {
    const copy = { type: entry.type, fields: { ...(entry.fields || {}) } };
    copy.key = entry.key + '-copy';
    return copy;
  }

  function collectForm(form, base) {
    const out = { type: base.type, key: base.key, fields: { ...(base.fields || {}) } };
    const inputs = form.querySelectorAll('input, textarea, select');
    inputs.forEach((el) => {
      if (el.name === 'key') out.key = el.value;
      else if (el.name) out.fields[el.name] = el.value;
    });
    return out;
  }

  globalThis.GitCiteRowAction = { open };
})();
</script>

    // when the user actually submits a search.

    submit.type = 'submit';
    submit.setAttribute('data-search-submit', '');

// AND-combined criteria over the in-memory model. Filter changes
// announce through the SHARED polite live region — never a per-filter
// region (hotspot H13). Clear filters refocuses the search input.

  const STATE_KEY = 'gitcite.filtersOpen';

  let _host = null;

  let _disclosureRegion = null;

  function isOpen() {
    try { return localStorage.getItem(STATE_KEY) === 'true'; } catch (_) { return false; }
  }
  function setOpen(open) {
    try { localStorage.setItem(STATE_KEY, open ? 'true' : 'false'); } catch (_) {}

// Region with aria-labelledby pointing at the entry-title heading.

  let _opts = {};

    // already supplies a labelled <h2> at the top, so we skip the

    const remove = document.createElement('button');
    remove.type = 'button';

// Sections are disclosures; required fields show '(required)' text +
// required attribute; placeholders are not labels. On validation failure

(function () {
  'use strict';

  if (globalThis.GitCiteEditForm) return;

  const TYPES = ['article', 'book', 'inbook', 'incollection', 'inproceedings', 'techreport', 'phdthesis', 'misc', 'unpublished', 'working', 'archival'];

  function open(host, opts) {

    const Field = globalThis.GitCiteField;
    const ids = globalThis.GitCiteIds;
    const original = opts.entry ? JSON.parse(JSON.stringify(opts.entry)) : { type: 'article', key: '', fields: {} };
    const isNew = !opts.entry;
    const errorSlot = document.createElement('div');

    host.innerHTML = '';
    const heading = document.createElement('h2');
    heading.textContent = isNew ? 'New entry' : `Edit: ${original.key}`;
    host.appendChild(heading);

    const typeId = ids.next('edit-type');
    const typeLabel = document.createElement('label');
    typeLabel.setAttribute('for', typeId);
    typeLabel.textContent = 'Entry type';
    basics.appendChild(typeLabel);
    const typeSelect = document.createElement('select');
    typeSelect.id = typeId;
    typeSelect.setAttribute('data-edit-type', '');
    for (const t of TYPES) {
      const o = document.createElement('option');
      o.value = t;
      o.textContent = t;
      if (t === original.type) o.selected = true;
      typeSelect.appendChild(o);
    }
    typeSelect.addEventListener('change', () => {
      original.type = typeSelect.value;
      archivalSection.hidden = original.type !== 'archival';

    const keyField = Field.input({ name: 'key', label: 'Citation key', required: true, value: original.key });

    basics.appendChild(keyField);

    const titleField = Field.input({ name: 'title', label: 'Title', required: true, value: original.fields.title || '' });
    titleField.querySelector('input').setAttribute('data-edit-title', '');
    basics.appendChild(titleField);

    const authorField = Field.input({ name: 'author', label: 'Author(s)', value: original.fields.author || '', help: 'Use "Last, First and Last, First" format.' });
    basics.appendChild(authorField);

    const yearField = Field.input({ name: 'year', label: 'Year', value: original.fields.year || '', inputMode: 'numeric' });
    basics.appendChild(yearField);

    // ----- Publication -----

    form.appendChild(pub);

    // ----- Identifiers -----
    const ids2 = section('Identifiers', false);

    const jelField = Field.input({ name: 'jel', label: 'JEL codes', value: original.fields.jel || '', help: 'Semicolon-separated, e.g., "R11; R31".' });

    // ----- Custom fields -----
    const customSection = section('Custom fields', false);
    const customMount = document.createElement('div');
    customSection.appendChild(customMount);
    globalThis.GitCiteCustomFields.mount(customMount);
    // Hydrate with existing custom entries (anything not in the canonical set).

    // ----- Notes -----

    notes.appendChild(Field.input({ name: 'abstract', label: 'Abstract', tag: 'textarea', value: original.fields.abstract || '' }));
    notes.appendChild(Field.input({ name: 'keywords', label: 'Keywords', value: original.fields.keywords || '' }));
    notes.appendChild(Field.input({ name: 'note', label: 'Note', value: original.fields.note || '' }));
    form.appendChild(notes);

    // ----- Submit -----
    const actions = document.createElement('div');
    actions.style.cssText = 'display:flex;gap:0.5rem;margin-block-start:1rem;';
    const saveBtn = document.createElement('button');
    saveBtn.type = 'submit';
    saveBtn.textContent = 'Save Entry';
    saveBtn.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
    actions.appendChild(saveBtn);

    const cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
    cancelBtn.addEventListener('click', () => {
      if (typeof opts.onCancel === 'function') opts.onCancel();

    form.appendChild(actions);

    // Helpers --------------------------------------------------------------
    function section(label, expanded) {
      const wrap = document.createElement('section');
      const id = ids.next('edit-section');
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.setAttribute('aria-expanded', String(!!expanded));
      btn.setAttribute('aria-controls', id);
      btn.textContent = label;
      btn.style.cssText = 'min-block-size:44px;min-inline-size:44px;text-align:left;font-weight:600;';
      const region = document.createElement('div');
      region.id = id;

        const open = btn.getAttribute('aria-expanded') === 'true';

      wrap.appendChild = region.appendChild.bind(region);

    function readForm() {
      const fields = Object.create(null);
      form.querySelectorAll('.gitcite-field input, .gitcite-field textarea').forEach((el) => {

      const cf = globalThis.GitCiteCustomFields.values();
      for (const k of Object.keys(cf)) fields[k] = cf[k];

      errorSlot.innerHTML = '';

    form.addEventListener('keydown', (e) => {

        save();
      }
    });
  }

  globalThis.GitCiteEditForm = { open };
})();

// Phase 5 — Quick Add by DOI modal. DESIGN_SPEC §9.3.
// Native <dialog>; focus on the DOI input on open; Escape closes; errors
// associated to the input via aria-describedby.

(function () {
  'use strict';

  if (globalThis.GitCiteQuickAdd) return;

  function open(opts) {
    opts = opts || {};
    const Field = globalThis.GitCiteField;
    const Dialog = globalThis.GitCiteDialog;
    const handle = Dialog.open({
      title: 'Quick Add by DOI',
      content: '<p id="quick-add-desc">Paste a DOI or doi.org URL.</p>',
      describedById: 'quick-add-desc',
    });
    const body = handle.dialog.querySelector('.gitcite-dialog-body');
    const wrap = document.createElement('div');
    body.appendChild(wrap);

    const f = Field.input({ name: 'doi', label: 'DOI', placeholder: '10.1234/abc.5678' });
    wrap.appendChild(f);
    const input = f.querySelector('input');
    input.focus();

    const error = document.createElement('div');
    error.id = 'quick-add-error';
    error.setAttribute('role', 'alert');
    error.style.cssText = 'color:var(--danger);';
    wrap.appendChild(error);

    const fetchBtn = document.createElement('button');
    fetchBtn.type = 'button';
    fetchBtn.textContent = 'Fetch';
    fetchBtn.style.cssText = 'min-block-size:44px;min-inline-size:44px;margin-inline-end:0.5rem;';
    wrap.appendChild(fetchBtn);

    const cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
    cancelBtn.addEventListener('click', () => handle.close());
    wrap.appendChild(cancelBtn);

    fetchBtn.addEventListener('click', async () => {
      error.textContent = '';
      const v = (input.value || '').trim();
      const m = v.match(/(10\.\d{4,9}\/[^\s]+)/);
      if (!m) {
        input.setAttribute('aria-invalid', 'true');
        input.setAttribute('aria-describedby', 'quick-add-error');
        error.textContent = 'That does not look like a DOI.';
        input.focus();
        return;
      }
      const doi = m[1];
      if (typeof opts.onFetch === 'function') {
        try {
          const data = await opts.onFetch(doi);
          handle.close();
          if (typeof opts.onPick === 'function') opts.onPick(data);
        } catch (e) {
          error.textContent = e && e.message ? e.message : 'Lookup failed.';
        }
      }
    });
  }

  globalThis.GitCiteQuickAdd = { open };
})();

// Phase 13 Edit 1 / Phase 15 — multi-mode add-citation modal.
// The user picks a search mode (DOI / Title / Author / Keyword); DOI
// mode runs a direct CrossRef lookup via providers.byDoi, the others
// go through the existing keyword-search providers (Semantic Scholar
// / OpenAlex / CrossRef). Results render with the result-card invariant
// (heading-link + Select only). Select fires onPick with the chosen
// result and closes the dialog.
//
// Phase 15 additions:
//   #4  After Select, the dialog routes the picked result through onPick,
//       which opens an edit form. After the user saves the form, focus
//       returns to the original Select button so the search list is the
//       resumption point — no need to tab back.
//   #7  Page size combobox (10/25/50/100/500).
//   #8  Pagination — Prev / Next buttons, status text "showing N–M of T".
// WCAG 1.3.1, 2.4.3, 2.4.4, 3.3.1, 3.3.3, 4.1.2, 4.1.3.

(function () {
  'use strict';

  if (globalThis.GitCiteAddSearch) return;

  const MODES = [
    { value: 'doi', label: 'DOI', inputLabel: 'DOI', placeholder: '10.1234/abc' },
    { value: 'title', label: 'Title', inputLabel: 'Title query', placeholder: 'On the theory of cities' },
    { value: 'author', label: 'Author', inputLabel: 'Author name', placeholder: 'Jane Smith' },
    { value: 'keyword', label: 'Keyword', inputLabel: 'Keyword query', placeholder: 'urban planning' },
  ];

  // Phase 17 follow-up — per-provider capability map. The search UI
  // restricts page-size choices and pagination to what each provider
  // can actually deliver, so the user is never offered a setting that
  // produces an HTTP 400 / 404 / silent truncation.
  //
  //   semanticscholar  /paper/search caps unauthenticated traffic at
  //                    100 results total (offset+limit ≤ 100). limit
  //                    max 100, page sizes ≤ 100. Without these caps
  //                    the user can pick "500 per page" or page beyond
  //                    100 and hit a hard 400 Bad Request.
  //   openalex         per_page max 200; cursor-style pagination beyond
  //                    10000 (we use page-based, capped at 10000).
  //   crossref         rows max 1000; deep pagination with offset.
  //
  // Adjust here when adding a provider; the UI follows automatically.
  const PROVIDER_CAPS = {
    semanticscholar: {
      pageSizes: [10, 25, 50, 100],
      maxResults: 100,
      note: 'Semantic Scholar caps unauthenticated paper search at 100 results total. Switch to OpenAlex or CrossRef for deeper pagination.',
    },
    openalex: {
      pageSizes: [10, 25, 50, 100, 200],
      maxResults: 10000,
      note: '',
    },
    crossref: {
      pageSizes: [10, 25, 50, 100, 500, 1000],
      maxResults: 10000,
      note: '',
    },
  };
  function getCaps(provider) {
    return PROVIDER_CAPS[provider] || PROVIDER_CAPS.semanticscholar;
  }

  function open(opts) {
    opts = opts || {};
    const Dialog = globalThis.GitCiteDialog;
    if (!Dialog) return null;
    const handle = Dialog.open({
      title: 'Add citation',
      content: '<p id="add-search-desc">Search for a citation by DOI, title, author, or keyword.</p>',
      describedById: 'add-search-desc',
    });

    body.appendChild(buildForm(handle, opts));
    return handle;
  }

  function buildForm(handle, opts) {
    const form = document.createElement('form');
    form.setAttribute('aria-label', 'Add citation form');
    form.style.cssText = 'display:flex;flex-direction:column;gap:0.5rem;';

    // Mode radio group --------------------------------------------------
    const fs = document.createElement('fieldset');
    const lg = document.createElement('legend');
    lg.textContent = 'Search by';
    fs.appendChild(lg);
    for (const mode of MODES) {
      const id = 'add-search-mode-' + mode.value;
      const wrap = document.createElement('label');
      wrap.setAttribute('for', id);
      wrap.style.cssText = 'display:inline-block;margin-inline-end:0.5rem;';
      const r = document.createElement('input');
      r.type = 'radio';
      r.name = 'add-search-mode';
      r.value = mode.value;
      r.id = id;

      wrap.appendChild(r);
      wrap.appendChild(document.createTextNode(' ' + mode.label));
      fs.appendChild(wrap);

    // Input -------------------------------------------------------------
    const initialMode = MODES.find((m) => m.value === 'keyword');
    const inputWrap = document.createElement('div');
    const inputLabel = document.createElement('label');
    inputLabel.setAttribute('data-search-input-label', '');
    inputLabel.textContent = initialMode.inputLabel;
    const inputId = 'add-search-input';
    inputLabel.setAttribute('for', inputId);
    const input = document.createElement('input');
    input.id = inputId;
    input.type = 'search';
    input.setAttribute('data-search-input', '');
    input.setAttribute('autocomplete', 'off');
    input.placeholder = initialMode.placeholder;
    inputWrap.appendChild(inputLabel);
    inputWrap.appendChild(document.createElement('br'));
    inputWrap.appendChild(input);

    const sizeBlock = document.createElement('div');
    const sizeLabel = document.createElement('label');
    const sizeId = 'add-search-page-size';
    sizeLabel.setAttribute('for', sizeId);
    sizeLabel.textContent = 'Results per page';
    sizeBlock.appendChild(sizeLabel);
    sizeBlock.appendChild(document.createElement('br'));
    const sizeSelect = document.createElement('select');
    sizeSelect.id = sizeId;
    sizeSelect.setAttribute('data-search-page-size', '');
    sizeBlock.appendChild(sizeSelect);
    providerWrap.appendChild(sizeBlock);

    const capNote = document.createElement('p');

    capNote.style.cssText = 'margin:0.25rem 0;color:var(--fg-muted);font-size:0.875rem;';

    // Submit + Cancel ---------------------------------------------------
    const actions = document.createElement('div');
    actions.style.cssText = 'display:flex;gap:0.5rem;';
    const submit = document.createElement('button');
    submit.type = 'submit';
    submit.setAttribute('data-search-submit', '');
    submit.textContent = 'Search';
    submit.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
    actions.appendChild(submit);
    const cancel = document.createElement('button');
    cancel.type = 'button';
    cancel.textContent = 'Cancel';
    cancel.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
    cancel.addEventListener('click', () => handle.close());
    actions.appendChild(cancel);
    form.appendChild(actions);

    // Error + status + recovery + results -------------------------------
    const error = document.createElement('div');
    error.setAttribute('data-search-error', '');
    error.setAttribute('role', 'alert');
    error.style.cssText = 'color:var(--danger);';
    form.appendChild(error);

    const recovery = document.createElement('div');

    resultsHeading.id = 'add-search-results-heading';
    resultsHeading.setAttribute('tabindex', '-1');
    resultsHeading.style.cssText = 'margin-block-start:0.5rem;display:none;';
    resultsHeading.textContent = 'Results';
    form.appendChild(resultsHeading);

    // Phase 14 a11y-review (Major) — drop role="list" because result
    // cards are <article> elements, not role="listitem". role="list"
    // with non-listitem children produces "list with 0 items" in NVDA.
    const results = document.createElement('div');
    results.setAttribute('data-search-results', '');
    results.setAttribute('aria-labelledby', 'add-search-results-heading');
    form.appendChild(results);

    // Phase 15 #8 — pagination controls. Hidden until a search returns
    // results; always rendered to the DOM so screen readers can find it
    // by reverse traversal from the results region. role="navigation"
    // gives an explicit landmark with the page-status text as its name.
    const pager = document.createElement('nav');
    pager.setAttribute('data-search-pager', '');
    pager.setAttribute('aria-label', 'Search results pages');
    pager.style.cssText = 'display:none;gap:0.5rem;align-items:center;margin-block-start:0.5rem;';
    const prevBtn = document.createElement('button');
    prevBtn.type = 'button';
    prevBtn.setAttribute('data-search-prev', '');
    prevBtn.textContent = 'Previous page';
    prevBtn.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
    const nextBtn = document.createElement('button');
    nextBtn.type = 'button';
    nextBtn.setAttribute('data-search-next', '');
    nextBtn.textContent = 'Next page';
    nextBtn.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
    const pageStatus = document.createElement('span');
    pageStatus.setAttribute('data-search-page-status', '');
    pager.appendChild(prevBtn);
    pager.appendChild(nextBtn);
    pager.appendChild(pageStatus);
    form.appendChild(pager);

    // Phase 15 — search state lives on a per-form context object so the
    // page-change handlers and the focus-return path can read/update
    // shared values without prop-drilling.
    const ctx = {
      form, input, provSelect, sizeSelect, error, recovery, status, results,
      resultsHeading,
      pager, prevBtn, nextBtn, pageStatus, opts, handle,
      offset: 0,
      lastTotal: 0,
      lastPickedKey: null, // identifies the Select button to refocus on save
      // Phase 16 #3 — pin the provider that produced the displayed
      // results. Pagination uses this rather than re-reading provSelect,
      // so a fallback to OpenAlex (or any external mutation of the select)
      // does not silently swap providers when paginating.
      activeProvider: null,
      // Phase 16 #2 — remember which pager button the user pressed so
      // focus can be restored to it after the next render. The new node
      // is a different DOM element so we must look it up by data-attr.
      pendingFocus: null, // 'prev' | 'next' | null
      // Phase 17 #4 — set after a fallback so the next successful render
      // moves focus to the results heading instead of the pager.
      pendingFocusHeading: false,
    };

    prevBtn.addEventListener('click', () => {
      const limit = parseInt(sizeSelect.value, 10) || 10;
      ctx.offset = Math.max(0, ctx.offset - limit);
      ctx.pendingFocus = 'prev';
      runSearch(ctx, { keepOffset: true, provider: ctx.activeProvider });
    });
    nextBtn.addEventListener('click', () => {
      const limit = parseInt(sizeSelect.value, 10) || 10;
      ctx.offset = ctx.offset + limit;
      ctx.pendingFocus = 'next';
      runSearch(ctx, { keepOffset: true, provider: ctx.activeProvider });
    });
    // Phase 17 #7 — WCAG-compliant On Input behaviour. Changing provider
    // or page size used to trigger a re-fetch immediately, which is a
    // change of context for screen-reader users. Now both selects are
    // pure form state: the next Search press (or pager click) consumes
    // the value. Pager clicks already pass ctx.activeProvider, so a
    // mid-pagination provider change is intentionally ignored until the
    // user submits a new search.
    sizeSelect.addEventListener('change', () => {
      // Reset offset so a new search starts on page 1, but don't fire.
      ctx.offset = 0;
    });
    provSelect.addEventListener('change', () => {
      // Reset offset; user must press Search to apply.
      ctx.offset = 0;
      // Phase 17 follow-up — repopulate page-size options for the newly
      // selected provider (filter the choice list down to what that
      // provider can actually return) and surface its capability note.
      // Pure UI / DOM update — no network call, so still WCAG 3.2.2 OK.
      syncProviderCaps();
    });

    function syncProviderCaps() {
      const caps = getCaps(provSelect.value);
      // Preserve the user's prior choice when it's still valid; otherwise
      // pick the largest option the new provider supports (best UX:
      // someone who liked "100 per page" on CrossRef switching to
      // Semantic Scholar gets 100 not 10).
      const prev = parseInt(sizeSelect.value, 10) || 10;
      sizeSelect.innerHTML = '';
      for (const n of caps.pageSizes) {
        const o = document.createElement('option');
        o.value = String(n); o.textContent = String(n);
        sizeSelect.appendChild(o);
      }
      const fallback = caps.pageSizes[caps.pageSizes.length - 1];
      sizeSelect.value = String(caps.pageSizes.includes(prev) ? prev : fallback);
      capNote.textContent = caps.note || '';
    }
    // Initial population for the default provider.
    syncProviderCaps();

    // Mode change handler -----------------------------------------------
    function onModeChange() {
      const mode = currentMode(form);
      const cfg = MODES.find((m) => m.value === mode);
      inputLabel.textContent = cfg.inputLabel;
      input.placeholder = cfg.placeholder;
      providerWrap.hidden = mode === 'doi';
      submit.textContent = mode === 'doi' ? 'Look up DOI' : 'Search';
    }
    fs.addEventListener('change', onModeChange);

    // Submit handler ----------------------------------------------------
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      ctx.offset = 0;
      runSearch(ctx);
    });
    submit.addEventListener('click', (e) => {
      // Without a real <form>.submit in jsdom we trigger the same handler.
      e.preventDefault();
      ctx.offset = 0;
      runSearch(ctx);
    });

    // Initial focus on the input.
    setTimeout(() => { try { input.focus(); } catch (_) {} }, 0);

    return form;
  }

  function currentMode(form) {
    const r = form.querySelector('input[name="add-search-mode"]:checked');
    return r ? r.value : 'keyword';
  }

  async function runSearch(ctx, runOpts) {
    runOpts = runOpts || {};
    const { form, input, provSelect, sizeSelect, error, recovery, status, results, opts, handle } = ctx;
    error.textContent = '';
    if (recovery) recovery.innerHTML = '';
    results.innerHTML = '';
    hidePager(ctx);
    const mode = currentMode(form);
    const query = (input.value || '').trim();
    if (!query) {
      error.textContent = 'Please enter a value to search.';
      input.focus();
      return;
    }
    const Providers = globalThis.GitCiteProviders;
    if (!Providers) {
      error.textContent = 'Search providers not loaded.';
      return;
    }
    let limit = sizeSelect ? (parseInt(sizeSelect.value, 10) || 10) : 10;
    let offset = runOpts.keepOffset ? ctx.offset : 0;
    // Phase 16 #3 — pagination passes the pinned provider so an earlier
    // OpenAlex fallback (or any provider switch) doesn't silently change
    // providers when stepping through pages. New searches read the live
    // <select>.
    const provider = runOpts.provider || provSelect.value;
    // Phase 17 follow-up — defensive clamp. The UI already restricts the
    // page-size select to per-provider capabilities, but a stale ctx.offset
    // (from a prior provider with deeper pagination) plus a fresh smaller
    // provider could still build a request the provider cannot serve.
    // Cap both at the provider's published reachability.
    const caps = getCaps(provider);
    const maxPageSize = caps.pageSizes[caps.pageSizes.length - 1];
    if (limit > maxPageSize) limit = maxPageSize;
    if (offset + limit > caps.maxResults) {
      offset = Math.max(0, caps.maxResults - limit);
    }
    ctx.offset = offset;
    // Phase 13 a11y review (M4): the status node is role=status, so
    // updating its text content is the announcement — do not also call
    // GitCiteAnnounce.polite (avoids double-announce).
    status.textContent = 'Searching…';
    try {
      const out = mode === 'doi'
        ? await Providers.byDoi(query)
        : await Providers.search({ provider, mode, query, limit, offset });
      ctx.lastTotal = out.total;
      ctx.activeProvider = mode === 'doi' ? null : provider;
      updatePager(ctx, out, limit, offset);
      renderResults(ctx, out);
      // Phase 17 #4 — show the results heading once results render.
      if (ctx.resultsHeading) ctx.resultsHeading.style.display = '';
      // Phase 17 #4 — after a fallback (or any explicit "focus heading"
      // trigger), move focus to the results heading so screen readers
      // announce "heading level 3, Results" instead of falling silent.
      if (ctx.pendingFocusHeading && ctx.resultsHeading) {
        ctx.pendingFocusHeading = false;
        ctx.pendingFocus = null;
        try { ctx.resultsHeading.focus(); } catch (_) {}
      } else if (ctx.pendingFocus) {
        // Phase 16 #2 — restore focus to the pager button the user clicked.
        // If that button is now disabled (e.g., reached the first/last page),
        // fall back to the other pager button so focus stays in the pager.
        const want = ctx.pendingFocus;
        ctx.pendingFocus = null;
        const target = (want === 'prev' && !ctx.prevBtn.disabled) ? ctx.prevBtn
          : (want === 'next' && !ctx.nextBtn.disabled) ? ctx.nextBtn
          : (!ctx.nextBtn.disabled ? ctx.nextBtn : !ctx.prevBtn.disabled ? ctx.prevBtn : null);
        if (target) { try { target.focus(); } catch (_) {} }
      }
    } catch (e) {
      const msg = (e && e.message) || 'Search failed';
      const code = e && e.code;
      // Phase 14 C.4 — distinct error messages + fallback to OpenAlex
      // when the failure is on the Semantic Scholar path.
      if (code === 'rate-limit') {
        error.textContent = 'Semantic Scholar is rate-limiting this client. Try OpenAlex (better rate limits) or CrossRef.';
        renderFallback(ctx, mode);
      } else if (code === 'forbidden') {
        error.textContent = 'Semantic Scholar requires an API key for this volume. Try OpenAlex or CrossRef.';
        renderFallback(ctx, mode);
      } else if (code === 'network') {
        error.textContent = 'Network error reaching Semantic Scholar. Try OpenAlex or CrossRef.';
        renderFallback(ctx, mode);
      } else if (code === 'parse') {
        error.textContent = 'Semantic Scholar returned malformed data.';
        renderFallback(ctx, mode);
      } else {
        error.textContent = /malformed/i.test(msg) ? 'Malformed DOI — please re-check.' : msg;
      }
      status.textContent = '';
    }
  }

  function hidePager(ctx) {
    ctx.pager.style.display = 'none';
    ctx.pageStatus.textContent = '';
  }

  function updatePager(ctx, out, limit, offset) {
    // Phase 17 follow-up — clamp the reachable total to the provider's
    // hard cap so the pager never invites the user to step into a
    // window that will 400. For Semantic Scholar that means stopping
    // at offset+limit ≤ 100; we display the upstream "of T" so the user
    // still sees how many matches existed, but disable Next earlier.
    const caps = getCaps(ctx.activeProvider || ctx.provSelect.value);
    const maxReachable = caps.maxResults;
    const upstreamTotal = out.total || out.results.length;
    const total = upstreamTotal;
    const start = total === 0 ? 0 : offset + 1;
    const end = Math.min(total, offset + out.results.length);
    // Phase 15 #8 — status text appears both at the top (status node)
    // and on the pager (data-search-page-status) so the announcement is
    // unambiguous and the pager has a visible text label.
    const reachableSuffix = (upstreamTotal > maxReachable)
      ? ` (provider returns at most ${maxReachable})`
      : '';
    ctx.status.textContent = total > out.results.length
      ? `Showing ${start}–${end} of ${total} results${reachableSuffix}`
      : `${out.results.length} of ${total} results${reachableSuffix}`;
    const pageCount = Math.max(1, Math.ceil(Math.min(total, maxReachable) / limit));
    ctx.pageStatus.textContent = `Page ${Math.floor(offset / limit) + 1} of ${pageCount}`;
    ctx.prevBtn.disabled = offset <= 0;
    // Disable Next when we've returned everything OR the next page would
    // exceed the provider's reachable cap.
    ctx.nextBtn.disabled = end >= total || (offset + limit) >= maxReachable;
    // Show pager only if there is at least one page of overflow OR results exist.
    ctx.pager.style.display = total > 0 ? 'flex' : 'none';
  }

  function renderFallback(ctx, mode) {
    const { recovery, error, results, input, provSelect, status } = ctx;
    const host = recovery || error;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.setAttribute('data-search-fallback', '');
    btn.style.cssText = 'min-block-size:44px;min-inline-size:44px;margin-block-start:0.5rem;';
    // Phase 14 a11y-review (Major) — descriptive label so the button
    // stands alone in NVDA's "buttons" list and announces its recovery
    // context.
    btn.textContent = 'Retry this search using OpenAlex';
    btn.addEventListener('click', async () => {
      // Phase 17 #6 — sticky OpenAlex. Set BOTH the live <select> and
      // ctx.activeProvider so the next pager click and any subsequent
      // search both stay on OpenAlex (the prior version only set the
      // select; pagination read ctx.activeProvider, which still pointed
      // at Semantic Scholar).
      provSelect.value = 'openalex';
      ctx.activeProvider = 'openalex';
      error.textContent = '';
      btn.remove();
      status.textContent = 'Searching…';
      const limit = ctx.sizeSelect ? (parseInt(ctx.sizeSelect.value, 10) || 10) : 10;
      try {
        const out = await globalThis.GitCiteProviders.search({
          provider: 'openalex', mode, query: input.value.trim(), limit, offset: 0,
        });
        ctx.offset = 0;
        ctx.lastTotal = out.total;
        updatePager(ctx, out, limit, 0);
        renderResults(ctx, out);
        // Phase 17 #4 / a11y-review m6 — focus the results heading after
        // the fallback succeeds so SR users anchor above the new list and
        // focus stays inside the dialog. Single, direct focus call —
        // earlier versions piped through ctx.pendingFocusHeading + the
        // runSearch path, which created two ways for one concern.
        if (ctx.resultsHeading) {
          ctx.resultsHeading.style.display = '';
          try { ctx.resultsHeading.focus(); } catch (_) {}
        }
      } catch (e) {
        // Phase 17 #4 — keep the network error visible inside the dialog
        // and do NOT move focus out. The next focusable element after the
        // (now-removed) fallback button is wherever focus naturally lands;
        // we re-render a fresh fallback button and refocus it.
        error.textContent = (e && e.message) || 'OpenAlex search failed';
        status.textContent = '';
        renderFallback(ctx, mode);
      }
    });
    host.appendChild(btn);
    // Move focus to the recovery button so keyboard users do not have
    // to tab back into the form to find it.
    setTimeout(() => { try { btn.focus(); } catch (_) {} }, 0);
  }

  function renderResults(ctx, out) {
    const { results, opts, handle } = ctx;
    const limit = ctx.sizeSelect ? (parseInt(ctx.sizeSelect.value, 10) || 10) : 10;
    const offset = ctx.offset || 0;
    results.innerHTML = '';
    const Card = globalThis.GitCiteResultCard;
    out.results.forEach((data, i) => {
      const card = Card.render(data, {
        posinset: offset + i + 1,
        setsize: out.total,
        onSelect: (d) => onPickResult(ctx, card, d),
      });
      // Phase 15 #4 — tag every Select button with a stable per-result
      // key so the focus-return path can find it after the edit dialog
      // closes. doi or url is most stable; fall back to title+offset.
      const stableKey = (d => d.doi || d.url || `${(d.title || '').slice(0, 40)}|${offset + i}`)(data);
      const selectBtn = card.querySelector('button');
      if (selectBtn) selectBtn.setAttribute('data-result-key', stableKey);
      results.appendChild(card);
    });
  }

  function onPickResult(ctx, card, data) {
    const { opts, handle } = ctx;
    const selectBtn = card.querySelector('button[data-result-key]');
    const stableKey = selectBtn ? selectBtn.getAttribute('data-result-key') : null;
    // Phase 15 #4 — opts.onPick is responsible for opening the edit
    // dialog with the picked data. Pass a returnFocus callback so the
    // caller can re-focus the originating Select button once the edit
    // dialog is dismissed (save or cancel). Fall back: close the dialog
    // when the consumer didn't opt into the focus-return contract.
    if (typeof opts.onPick === 'function') {
      // Track which result the user picked so we can refocus on save.
      ctx.lastPickedKey = stableKey;
      const ret = opts.onPick(data, {
        // Caller invokes this when the edit dialog closes. We restore
        // focus to the same Select button so resuming the search list is
        // a single Tab away.
        returnFocus: () => {
          // The dialog may have been re-rendered (pagination clicks, new
          // search), so look up the current button by key rather than
          // holding a stale node reference.
          if (!stableKey) return;
          const live = ctx.results.querySelector(`button[data-result-key="${cssEscape(stableKey)}"]`);
          if (live) {
            try { live.focus(); } catch (_) {}
          }
        },
      });
      // Legacy callers (e.g., Phase 13 tests) return undefined and expect
      // the dialog to close. New callers can return { keepOpen: true } to
      // keep the search modal open while the edit dialog is layered on top.
      if (!ret || !ret.keepOpen) {
        handle.close();
      }
    } else {
      handle.close();
    }
  }

  function cssEscape(s) {
    if (typeof CSS !== 'undefined' && CSS.escape) return CSS.escape(s);
    return String(s).replace(/(["\\\]])/g, '\\$1');
  }

  globalThis.GitCiteAddSearch = { open };
})();
</script>
  <script>
// Phase 6 / Phase 14 Group C — scholarly database providers.
// DESIGN_SPEC §10.1, §10.4.
//
// search({ provider, mode, query, limit, offset, signal, mailto }) →
//   { results, total, rateLimitText? }
//
// mode is one of 'doi' | 'title' | 'author' | 'keyword'. DOI mode is
// handled by byDoi(); the others build mode-aware URLs:
//   crossref      author → query.author=    title → query.title=    keyword → query=
//   openalex      author → filter=author.display_name.search:    title → filter=title.search:    keyword → search=
//   semanticscholar  no field-restricted parameter exposed; all three modes use query=
//
// Phase 14 C.4 — Semantic Scholar resilience:
//   * 1 req/sec client-side throttle (their anonymous endpoint
//     rate-limits hard at ~1/sec; verified by API probe).
//   * 429 retry with exponential backoff (1 s, then 2 s, then give up).
//   * GITCITE_CONFIG.semanticScholarApiKey forwarded as x-api-key.

(function () {
  'use strict';

  if (globalThis.GitCiteProviders) return;

  const CACHE_TTL = 5 * 60 * 1000;
  const cache = new Map();

  function cacheKey(p) {
    return `${p.provider}|${p.mode || 'keyword'}|${p.query}|${p.sort || ''}|${p.offset || 0}|${p.limit || 10}`;
  }
  function getCached(k) {
    const entry = cache.get(k);
    if (!entry) return null;
    if (Date.now() - entry.at > CACHE_TTL) { cache.delete(k); return null; }
    return entry.value;
  }
  function setCached(k, value) { cache.set(k, { at: Date.now(), value }); }

  // ---- Semantic Scholar throttle + retry --------------------------------
  // Phase 16 #4 — bumped throttle to 1500 ms after the user kept hitting
  // network errors at 1 req/sec. Semantic Scholar's anonymous endpoint is
  // intermittently aggressive — the published guidance is "polite is
  // around 1 req/sec" but in practice the unauth tier gets bursty 429s
  // even at exactly 1 req/sec. 1500 ms gives a comfortable margin.
  const SS_MIN_INTERVAL_MS = 1500;
  // Semantic Scholar's documented `limit` cap is 100; passing more
  // returns 400 ("Bad Request"). We honour the user's selected page size
  // for OpenAlex / CrossRef but clamp it for SS.
  const SS_MAX_LIMIT = 100;
  let _ssLastAt = 0;
  function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }
  async function ssThrottle() {
    const now = Date.now();
    const wait = Math.max(0, SS_MIN_INTERVAL_MS - (now - _ssLastAt));
    if (wait > 0) await sleep(wait);
    _ssLastAt = Date.now();
  }

  function ssApiKey() {
    const cfg = globalThis.GITCITE_CONFIG || {};
    return cfg.semanticScholarApiKey || null;
  }

  async function semanticScholar(p) {
    const k = cacheKey({ ...p, provider: 'semanticscholar' });
    const hit = getCached(k);
    if (hit) return hit;
    const url = new URL('https://api.semanticscholar.org/graph/v1/paper/search');
    url.searchParams.set('query', p.query);
    // Phase 16 #4 — clamp to Semantic Scholar's documented max so the
    // user's "Results per page = 500" choice doesn't make every SS
    // request fail with HTTP 400.
    const ssLimit = Math.min(p.limit || 10, SS_MAX_LIMIT);
    url.searchParams.set('limit', String(ssLimit));
    url.searchParams.set('offset', String(p.offset || 0));
    url.searchParams.set('fields', 'title,authors,venue,year,externalIds,abstract,citationCount,openAccessPdf');

    const apiKey = ssApiKey();
    const headers = {};
    if (apiKey) headers['x-api-key'] = apiKey;

    const backoff = [0, 1000, 2000]; // attempt 1: throttle only; 2/3 add backoff
    let lastErr = null;
    for (let attempt = 0; attempt < 3; attempt++) {
      await ssThrottle();
      if (backoff[attempt] > 0) await sleep(backoff[attempt]);
      const init = { headers };
      if (p.signal) init.signal = p.signal;
      let r;
      try {
        r = await fetch(url, init);
      } catch (e) {
        lastErr = Object.assign(new Error('Semantic Scholar network error'), { code: 'network', cause: e });
        continue;
      }
      if (r.status === 429) {
        // Phase 14 a11y-review (Major) — vary the message per attempt
        // so the polite-region's same-message throttle does not
        // suppress useful progress information.
        if (globalThis.GitCiteAnnounce) {
          const nextWait = backoff[attempt + 1];
          if (nextWait) {
            const secs = Math.round(nextWait / 1000);
            globalThis.GitCiteAnnounce.polite(`Semantic Scholar busy — retrying in ${secs} second${secs === 1 ? '' : 's'}`);
          }
        }
        lastErr = Object.assign(new Error('Rate limited'), { code: 'rate-limit' });
        continue;
      }
      if (r.status === 403) throw Object.assign(new Error('Semantic Scholar requires an API key'), { code: 'forbidden' });
      if (!r.ok) {
        // Phase 16 #4 — surface the server's own error body when Semantic
        // Scholar returns 4xx/5xx so the user sees the underlying reason
        // (e.g. "limit must be <= 100", "query parameter required").
        let bodySnippet = '';
        try { bodySnippet = (await r.text()).slice(0, 200); } catch (_) {}
        throw Object.assign(
          new Error(`Semantic Scholar error ${r.status}${bodySnippet ? ': ' + bodySnippet : ''}`),
          { code: 'http-' + r.status, status: r.status, body: bodySnippet },
        );
      }
      let data;
      try { data = await r.json(); }
      catch (e) { throw Object.assign(new Error('Semantic Scholar returned malformed data'), { code: 'parse' }); }
      // Phase 16 #4 — Semantic Scholar can return 200 with an `error`
      // field instead of an HTTP error code in some failure modes
      // (their internal indexer is occasionally slow). Detect that.
      if (data && typeof data === 'object' && data.error) {
        throw Object.assign(new Error('Semantic Scholar: ' + data.error), { code: 'upstream-error', upstream: data.error });
      }
      const out = {
        results: (data.data || []).map((x) => ({
          title: x.title,
          authors: (x.authors || []).map((a) => a.name).join(', '),
          venue: x.venue || '',
          year: x.year ? String(x.year) : '',
          doi: (x.externalIds || {}).DOI || '',
          abstract: x.abstract || '',
          url: x.openAccessPdf?.url || (x.externalIds?.DOI ? `https://doi.org/${x.externalIds.DOI}` : ''),
          citations: x.citationCount,
          datasource: 'semanticscholar',
        })),
        total: data.total || (data.data || []).length,
      };
      setCached(k, out);
      return out;
    }
    throw lastErr || Object.assign(new Error('Rate limited'), { code: 'rate-limit' });
  }

  // ---- OpenAlex ---------------------------------------------------------
  async function openAlex(p) {
    const k = cacheKey({ ...p, provider: 'openalex' });
    const hit = getCached(k);
    if (hit) return hit;
    const url = new URL('https://api.openalex.org/works');
    if (p.mode === 'author') {
      url.searchParams.set('filter', `author.display_name.search:${p.query}`);
    } else if (p.mode === 'title') {
      url.searchParams.set('filter', `title.search:${p.query}`);
    } else {
      url.searchParams.set('search', p.query);
    }
    url.searchParams.set('per_page', String(p.limit || 10));
    url.searchParams.set('page', String(Math.floor((p.offset || 0) / (p.limit || 10)) + 1));
    if (p.mailto) url.searchParams.set('mailto', p.mailto);
    const r = await fetch(url, p.signal ? { signal: p.signal } : undefined);
    if (!r.ok) throw new Error('OpenAlex error ' + r.status);
    const data = await r.json();
    const out = {
      results: (data.results || []).map((x) => ({
        title: x.title,
        authors: (x.authorships || []).map((a) => a.author?.display_name).filter(Boolean).join(', '),
        venue: x.host_venue?.display_name || x.primary_location?.source?.display_name || '',
        year: x.publication_year ? String(x.publication_year) : '',
        doi: (x.doi || '').replace(/^https?:\/\/doi\.org\//, ''),
        abstract: '',
        url: x.doi || x.id || '',
        citations: x.cited_by_count,
        datasource: 'openalex',
      })),
      total: data.meta?.count || (data.results || []).length,
    };
    setCached(k, out);
    return out;
