  // ---- CrossRef ---------------------------------------------------------
  async function crossref(p) {
    const k = cacheKey({ ...p, provider: 'crossref' });
    const hit = getCached(k);
    if (hit) return hit;
    const url = new URL('https://api.crossref.org/works');
    if (p.mode === 'author') {
      url.searchParams.set('query.author', p.query);
    } else if (p.mode === 'title') {
      url.searchParams.set('query.title', p.query);
    } else {
      url.searchParams.set('query', p.query);
    }
    url.searchParams.set('rows', String(p.limit || 10));
    url.searchParams.set('offset', String(p.offset || 0));
    const r = await fetch(url, p.signal ? { signal: p.signal } : undefined);
    if (!r.ok) throw new Error('CrossRef error ' + r.status);
    const data = await r.json();
    const items = data.message?.items || [];
    const out = {
      results: items.map((x) => ({
        title: (x.title || [])[0] || '',
        authors: (x.author || []).map((a) => `${a.family || ''}, ${a.given || ''}`).filter((s) => s !== ', ').join(' and '),
        venue: (x['container-title'] || [])[0] || '',
        year: ((x.issued?.['date-parts'] || [[]])[0][0]) ? String((x.issued['date-parts'])[0][0]) : '',
        doi: x.DOI || '',
        abstract: x.abstract || '',
        url: x.URL || (x.DOI ? `https://doi.org/${x.DOI}` : ''),
        citations: null,
        datasource: 'crossref-search',
      })),
      total: data.message?.['total-results'] || items.length,
    };
    setCached(k, out);
    return out;
  }

  function search(opts) {
    if (opts.provider === 'openalex') return openAlex(opts);
    if (opts.provider === 'crossref') return crossref(opts);
    return semanticScholar(opts);
  }

  // ---- byDoi ------------------------------------------------------------
  function normaliseDoi(input) {
    if (!input || typeof input !== 'string') return null;
    let s = input.trim();
    s = s.replace(/^https?:\/\/(dx\.)?doi\.org\//i, '');
    s = s.replace(/^doi:\s*/i, '');
    if (!/^10\.\d{4,9}\//.test(s)) return null;
    return s;
  }

  async function byDoi(input) {
    const doi = normaliseDoi(input);
    if (!doi) throw new Error('Malformed DOI');
    const k = 'doi|' + doi;
    const hit = getCached(k);
    if (hit) return hit;
    const url = new URL(`https://api.crossref.org/works/${doi}`);
    const r = await fetch(url);
    if (!r.ok) throw new Error('DOI lookup failed: ' + r.status);
    const data = await r.json();
    const x = (data && data.message) || {};
    const out = {
      results: [{
        title: (x.title || [])[0] || '',
        authors: (x.author || [])
          .map((a) => `${a.family || ''}, ${a.given || ''}`)
          .map((s) => s.replace(/, $/, ''))
          .filter((s) => s !== ', ' && s !== '')
          .join(' and '),
        venue: (x['container-title'] || [])[0] || '',
        year: ((x.issued?.['date-parts'] || [[]])[0][0]) ? String(x.issued['date-parts'][0][0]) : '',
        doi: x.DOI || doi,
        abstract: x.abstract || '',
        url: x.URL || `https://doi.org/${x.DOI || doi}`,
        citations: null,
        datasource: 'crossref-doi',
      }],
      total: 1,
    };
    setCached(k, out);
    return out;
  }

  globalThis.GitCiteProviders = {
    search, byDoi, normaliseDoi,
    _cacheClear: () => { cache.clear(); _ssLastAt = 0; },
  };
})();

// Phase 7 — Chicago Notes-Bibliography renderer. DESIGN_SPEC §12.
// Author formatting: first author inverted (Last, First), subsequent in
// natural order, Oxford comma for 3+, ed./eds. suffix for editor-only.

(function () {
  'use strict';

  if (globalThis.GitCiteChicago) return;

  function splitAuthors(s) {
    return String(s || '').split(/\s+and\s+/i).map((x) => x.trim()).filter(Boolean);
  }

  function naturalName(name) {
    // "Smith, Alice" → "Alice Smith"; "Alice Smith" → "Alice Smith"
    if (name.indexOf(',') >= 0) {
      const [last, first] = name.split(',', 2);
      return `${first.trim()} ${last.trim()}`.trim();
    }
    return name;
  }

  function invertedFirst(name) {
    if (name.indexOf(',') >= 0) return name;
    const parts = name.trim().split(/\s+/);
    if (parts.length < 2) return name;
    return `${parts[parts.length - 1]}, ${parts.slice(0, -1).join(' ')}`;
  }

  function formatAuthors(authors, suffix) {
    const list = splitAuthors(authors);
    if (!list.length) return '';
    if (list.length === 1) return invertedFirst(list[0]) + (suffix ? `, ${suffix}` : '');
    const first = invertedFirst(list[0]);
    const rest = list.slice(1).map(naturalName);
    let out;
    if (rest.length === 1) out = `${first}, and ${rest[0]}`;
    else out = `${first}, ${rest.slice(0, -1).join(', ')}, and ${rest[rest.length - 1]}`;
    return out + (suffix ? `, ${suffix}` : '');
  }

  function render(entry) {
    const f = entry.fields || {};
    const t = entry.type;
    if (t === 'archival') {
      const parts = [];
      if (f.author) parts.push(formatAuthors(f.author) + '.');
      if (f.item) parts.push(`"${f.item}."`);
      if (f.date_range) parts.push(f.date_range + '.');
      const loc = [f.collection, f.box ? `Box ${f.box}` : null, f.folder ? `Folder ${f.folder}` : null].filter(Boolean).join(', ');
      if (loc) parts.push(loc + '.');
      if (f.repository) parts.push(f.repository + '.');
      if (f.finding_aid_url) parts.push(f.finding_aid_url + '.');
      return parts.join(' ');
    }
    if (t === 'article') {
      const author = formatAuthors(f.author);
      const journal = f.journal || '';
      const volume = f.volume || '';
      const number = f.number || '';
      const year = f.year || '';
      const pages = f.pages || '';
      const doi = f.doi ? ` https://doi.org/${f.doi}.` : '';
      let venue = journal ? `*${journal}*` : '';
      if (volume) venue += ` ${volume}`;
      if (number) venue += `, no. ${number}`;
      if (year) venue += ` (${year})`;
      if (pages) venue += `: ${pages}`;
      return `${author}. "${f.title}." ${venue}.${doi}`.trim();
    }
    if (t === 'book' || t === 'inbook') {
      const author = formatAuthors(f.author);
      const editor = f.editor ? ` Edited by ${formatAuthors(f.editor)}.` : '';
      const edition = f.edition ? ` ${f.edition} ed.` : '';
      const place = f.address || '';
      const pub = f.publisher || '';
      const year = f.year || '';
      const placePub = [place, pub].filter(Boolean).join(': ');
      return `${author}. *${f.title}*.${editor}${edition} ${placePub}${placePub && year ? ', ' : ''}${year}.`.trim();
    }
    if (t === 'incollection' || t === 'inproceedings') {
      const author = formatAuthors(f.author);
      const editor = f.editor ? `, edited by ${formatAuthors(f.editor)}` : '';
      const pages = f.pages ? `, ${f.pages}` : '';
      const placePub = [f.address, f.publisher].filter(Boolean).join(': ');
      const year = f.year || '';
      return `${author}. "${f.title}." In *${f.booktitle}*${editor}${pages}. ${placePub}${placePub && year ? ', ' : ''}${year}.`.trim();
    }
    if (t === 'phdthesis') {
      const author = formatAuthors(f.author);
      return `${author}. "${f.title}." PhD diss., ${f.school || ''}, ${f.year || ''}.`;
    }
    if (t === 'techreport' || t === 'working') {
      const author = formatAuthors(f.author);
      const num = f.number ? ` No. ${f.number}.` : '';
      return `${author}. "${f.title}." ${f.institution || ''}, ${f.year || ''}.${num}`;
    }
    // misc / unpublished etc — minimal generic format
    const author = formatAuthors(f.author);
    return `${author}. "${f.title}." ${f.year || ''}.`.trim();
  }

  // Phase 17 #15 — APA 7th-edition formatter. Returned alongside the
  // Chicago renderer because both consume the same parsed entry shape;
  // splitting into a separate file would just add another concat slot.
  function apaInitial(name) {
    // "Alice Smith" → "A.", "Smith, Alice M." → "A. M."
    let first;
    if (name.indexOf(',') >= 0) first = name.split(',', 2)[1].trim();
    else {
      const parts = name.trim().split(/\s+/);
      if (parts.length < 2) return '';
      first = parts.slice(0, -1).join(' ');
    }
    return first
      .split(/\s+/)
      .map((p) => p ? p[0].toUpperCase() + '.' : '')
      .filter(Boolean)
      .join(' ');
  }
  function apaSurname(name) {
    if (name.indexOf(',') >= 0) return name.split(',', 2)[0].trim();
    const parts = name.trim().split(/\s+/);
    return parts[parts.length - 1];
  }
  function formatAuthorsAPA(authors) {
    const list = splitAuthors(authors);
    if (!list.length) return '';
    const formatted = list.map((n) => {
      const initials = apaInitial(n);
      const surname = apaSurname(n);
      return initials ? `${surname}, ${initials}` : surname;
    });
    if (formatted.length === 1) return formatted[0];
    if (formatted.length === 2) return `${formatted[0]}, & ${formatted[1]}`;
    if (formatted.length <= 20) {
      return formatted.slice(0, -1).join(', ') + ', & ' + formatted[formatted.length - 1];
    }
    // APA: 21+ authors — first 19, ellipsis, last.
    return formatted.slice(0, 19).join(', ') + ', ... ' + formatted[formatted.length - 1];
  }
  // Phase 18 #7 / #8 — APA renderer rewrite.
  // Strategy: build per-entry segments, drop empty ones, terminate each
  // non-URL segment with a period, then join with single spaces. This
  // eliminates the trailing ". ." artifacts that the previous template
  // approach produced when an optional field (venue, publisher, etc.)
  // was missing. The URL — DOI when available, else the entry's `url`
  // field — is always emitted last when present (#7).
  function renderAPA(entry) {
    const f = entry.fields || {};
    const t = entry.type;
    const author = formatAuthorsAPA(f.author);
    const yearStr = f.year ? `(${f.year})` : '(n.d.)';
    const title = (f.title || '').replace(/\.+$/, '');
    const url = f.doi ? `https://doi.org/${f.doi}` : (f.url || '');

    let segments;
    if (t === 'article') {
      const j = f.journal || '';
      const v = f.volume || '';
      const n = f.number ? `(${f.number})` : '';
      const pg = f.pages || '';
      let venue = j;
      if (v) venue += `, ${v}${n}`;
      else if (n) venue += n;
      if (pg) venue += `, ${pg}`;
      segments = [author, yearStr, title, venue, url];
    } else if (t === 'book' || t === 'inbook') {
      const ed = f.edition ? `(${f.edition} ed.)` : '';
      const titleSeg = ed ? `${title} ${ed}` : title;
      segments = [author, yearStr, titleSeg, f.publisher || '', url];
    } else if (t === 'incollection' || t === 'inproceedings') {
      const editor = f.editor ? `${formatAuthorsAPA(f.editor)} (Eds.), ` : '';
      const bk = f.booktitle || '';
      const pg = f.pages ? ` (pp. ${f.pages})` : '';
      const inSeg = (bk || pg) ? `In ${editor}${bk}${pg}` : '';
      segments = [author, yearStr, title, inSeg, f.publisher || '', url];
    } else if (t === 'phdthesis' || t === 'mastersthesis') {
      const kind = t === 'phdthesis' ? 'Doctoral dissertation' : "Master's thesis";
      const titleSeg = title ? `${title} [${kind}]` : `[${kind}]`;
      segments = [author, yearStr, titleSeg, f.school || '', url];
    } else if (t === 'techreport' || t === 'working') {
      const num = f.number ? `(${f.number})` : '';
      const titleSeg = num ? `${title} ${num}` : title;
      segments = [author, yearStr, titleSeg, f.institution || '', url];
    } else if (t === 'archival') {
      const item = f.item || title;
      const loc = [f.collection, f.box ? `Box ${f.box}` : null, f.folder ? `Folder ${f.folder}` : null].filter(Boolean).join(', ');
      segments = [author, yearStr, item, loc, f.repository || '', url];
    } else {
      segments = [author, yearStr, title, url];
    }

    const out = [];
    segments.forEach((s, i) => {
      const txt = (s == null ? '' : String(s)).trim();
      if (!txt) return;
      const isLast = i === segments.length - 1;
      const isUrl = isLast && /^https?:\/\//.test(txt);
      if (isUrl) {
        out.push(txt);
      } else {
        out.push(txt.replace(/\.+$/, '') + '.');
      }
    });
    return out.join(' ');
  }

  globalThis.GitCiteChicago = { render, formatAuthors, renderAPA, formatAuthorsAPA };
  globalThis.GitCiteAPA = { render: renderAPA, formatAuthors: formatAuthorsAPA };
})();
</script>

// Phase 6 — keyword search panel. DESIGN_SPEC §10.
// HOTSPOT H17: aria-posinset/aria-setsize reflect TOTAL result count, not
// loaded count. Polite/assertive announcements through Phase 1.C.
// Result cards via Phase 5 invariant pattern.

(function () {
  'use strict';

  if (globalThis.GitCiteKeywordSearch) return;

  let _state = {
    provider: 'semanticscholar',
    query: '',
    sort: 'relevance',
    offset: 0,
    limit: 10,
    total: 0,
    loaded: [],
  };

  function open(host, opts) {
    opts = opts || {};
    host.innerHTML = '';
    host.setAttribute('aria-label', 'Search scholarly databases');
    const Field = globalThis.GitCiteField;

    const heading = document.createElement('h2');
    heading.textContent = 'Search scholarly sources';
    host.appendChild(heading);

    // Provider select
    const providerWrap = document.createElement('div');
    const providerId = (globalThis.GitCiteIds || { next: () => 'ks-provider' }).next('ks-provider');
    const providerLabel = document.createElement('label');
    providerLabel.setAttribute('for', providerId);
    providerLabel.textContent = 'Provider';
    providerWrap.appendChild(providerLabel);
    const providerSelect = document.createElement('select');
    providerSelect.id = providerId;
    for (const [v, l] of [['semanticscholar', 'Semantic Scholar'], ['openalex', 'OpenAlex'], ['crossref', 'CrossRef']]) {
      const o = document.createElement('option');
      o.value = v;
      o.textContent = l;
      if (v === _state.provider) o.selected = true;
      providerSelect.appendChild(o);
    }
    providerSelect.addEventListener('change', () => { _state.provider = providerSelect.value; runSearch({ reset: true }); });
    providerWrap.appendChild(providerSelect);
    host.appendChild(providerWrap);

    // Query input
    const queryField = Field.input({ name: 'q', label: 'Query', placeholder: 'paper title, author, topic', type: 'search' });
    const queryInput = queryField.querySelector('input');
    queryInput.setAttribute('data-keyword-query', '');
    host.appendChild(queryField);

    // Sort
    const sortFs = document.createElement('fieldset');
    const sortLegend = document.createElement('legend');
    sortLegend.textContent = 'Sort by';
    sortFs.appendChild(sortLegend);
    for (const [v, l] of [['relevance', 'Relevance'], ['year', 'Year ↓'], ['citations', 'Citations ↓']]) {
      const id = (globalThis.GitCiteIds || { next: () => 'ks-sort' }).next('ks-sort');
      const wrap = document.createElement('label');
      wrap.setAttribute('for', id);
      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.id = id;
      radio.name = 'gitcite-keyword-sort';
      radio.value = v;
      if (v === _state.sort) radio.checked = true;
      radio.addEventListener('change', () => { if (radio.checked) { _state.sort = v; runSearch({ reset: true }); } });
      wrap.appendChild(radio);
      wrap.appendChild(document.createTextNode(' ' + l));
      sortFs.appendChild(wrap);
    }
    host.appendChild(sortFs);

    const submit = document.createElement('button');
    submit.type = 'button';
    submit.textContent = 'Search';
    submit.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
    submit.addEventListener('click', () => { _state.query = queryInput.value; runSearch({ reset: true }); });
    host.appendChild(submit);

    queryInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); _state.query = queryInput.value; runSearch({ reset: true }); }
    });

    const status = document.createElement('p');
    status.setAttribute('role', 'status');
    status.setAttribute('data-keyword-status', '');
    host.appendChild(status);

    const resultList = document.createElement('div');
    resultList.setAttribute('role', 'list');
    resultList.setAttribute('aria-label', 'Search results');
    host.appendChild(resultList);

    const errorBox = document.createElement('p');
    errorBox.setAttribute('role', 'alert');
    errorBox.style.cssText = 'color:var(--danger);';
    host.appendChild(errorBox);

    const more = document.createElement('button');
    more.type = 'button';
    more.textContent = 'Load more';
    more.hidden = true;
    more.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
    more.addEventListener('click', () => runSearch({ reset: false }));
    host.appendChild(more);

    async function runSearch({ reset }) {
      const Providers = globalThis.GitCiteProviders;
      const Announce = globalThis.GitCiteAnnounce;
      const ResultCard = globalThis.GitCiteResultCard;
      if (!Providers || !ResultCard) return;
      errorBox.textContent = '';
      if (reset) {
        _state.offset = 0;
        _state.loaded = [];
        resultList.innerHTML = '';
      }
      if (!_state.query) {
        status.textContent = '';
        more.hidden = true;
        return;
      }
      status.textContent = `Searching ${_state.provider}…`;
      Announce && Announce.polite(`Searching ${_state.provider}`);
      let prevLoaded = _state.loaded.length;
      try {
        const data = await Providers.search({
          provider: _state.provider,
          query: _state.query,
          sort: _state.sort,
          offset: _state.offset,
          limit: _state.limit,
          mailto: opts.mailto,
        });
        _state.total = data.total || data.results.length;
        _state.loaded = _state.loaded.concat(data.results);
        // Render newly added results.
        const total = _state.total;
        let firstNewCard = null;
        for (let i = prevLoaded; i < _state.loaded.length; i++) {
          const r = _state.loaded[i];
          const card = ResultCard.render(r, {
            posinset: i + 1,
            setsize: total,
            onSelect: (d) => { if (typeof opts.onPick === 'function') opts.onPick(d); },
          });
          resultList.appendChild(card);
          if (i === prevLoaded) firstNewCard = card;
        }
        _state.offset = _state.loaded.length;
        const showing = `Showing 1–${_state.loaded.length} of ${total} results`;
        status.textContent = showing;
        if (reset) {
          Announce && Announce.polite(`${total} results`);
        } else {
          Announce && Announce.polite(`Loaded ${data.results.length} more results — ${showing}`);
          // Move focus to the first newly loaded result's heading.
          if (firstNewCard) {
            const link = firstNewCard.querySelector('h3 a, h3 button');
            if (link) link.focus();
          }
        }
        more.hidden = _state.loaded.length >= total;
      } catch (e) {
        const msg = (e && e.code === 'rate-limit') ? 'Rate limited — try again in 30 seconds' : (e && e.message) || 'Search failed.';
        status.textContent = '';
        errorBox.textContent = msg;
        Announce && Announce.assertive(msg);
      }
    }

    if (globalThis.GitCiteShortcuts) {
      try {
        globalThis.GitCiteShortcuts.register({
          key: 'k', mod: 'mod', label: 'Open keyword search', action: 'open-keyword-search',
          handler: () => queryInput.focus(),
        });
      } catch (_) {}
    }

    return { focus: () => queryInput.focus(), runSearch };
  }

  globalThis.GitCiteKeywordSearch = { open };
})();

// Phase 7 — Insights modal. DESIGN_SPEC §13.1 (HOTSPOT H8).
// Six tabs: Overview, Citation Age, Authors, Venues, JEL Coverage, Quality.
// Bars are keyboard-focusable with text alternatives. Each panel includes
// a plain-language caption (1.1.1, 3.1.5).

(function () {
  'use strict';

  if (globalThis.GitCiteInsights) return;

  // Phase 17 #11 — store the active dialog handle + filter callback so
  // bar buttons can close the modal and apply a filter to the library.
  let _activeHandle = null;
  let _onApplyFilter = null;

  function open(entries, opts) {
    opts = opts || {};
    const Dialog = globalThis.GitCiteDialog;
    const handle = Dialog.open({ title: 'Insights', content: '' });
    _activeHandle = handle;
    _onApplyFilter = typeof opts.onApplyFilter === 'function' ? opts.onApplyFilter : null;
    const body = handle.dialog.querySelector('.gitcite-dialog-body');
    body.appendChild(renderTabs(entries));
  }

  function applyFilterAndClose(patch, label) {
    if (_onApplyFilter) {
      try { _onApplyFilter(patch, label); } catch (_) {}
    }
    if (_activeHandle) {
      try { _activeHandle.close(); } catch (_) {}
    }
    _activeHandle = null;
  }

  function renderTabs(entries) {
    const wrap = document.createElement('div');
    const tablist = document.createElement('div');
    tablist.setAttribute('role', 'tablist');
    tablist.setAttribute('aria-label', 'Insights tabs');
    wrap.appendChild(tablist);

    const tabs = [
      { id: 'overview', label: 'Overview', render: () => panelOverview(entries) },
      { id: 'age', label: 'Citation Age', render: () => panelAge(entries) },
      { id: 'authors', label: 'Authors', render: () => panelAuthors(entries) },
      { id: 'venues', label: 'Venues', render: () => panelVenues(entries) },
      { id: 'jel', label: 'JEL Coverage', render: () => panelJel(entries) },
      { id: 'quality', label: 'Quality', render: () => panelQuality(entries) },
    ];

    const panelHost = document.createElement('div');
    panelHost.style.cssText = 'margin-block-start:1rem;';

    tabs.forEach((t, i) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
      btn.id = `insights-tab-${t.id}`;
      btn.setAttribute('aria-controls', `insights-panel-${t.id}`);
      btn.textContent = t.label;
      btn.style.cssText = 'min-block-size:44px;min-inline-size:44px;margin-inline-end:0.25rem;';

        if (e.key === 'ArrowLeft') activate((i - 1 + tabs.length) % tabs.length);
      });

    });

    function activate(idx) {
      const tabBtns = tablist.querySelectorAll('[role="tab"]');
      tabBtns.forEach((b, j) => {
        b.setAttribute('aria-selected', j === idx ? 'true' : 'false');
        b.tabIndex = j === idx ? 0 : -1;
      });
      tabBtns[idx].focus();
      panelHost.innerHTML = '';
      const panel = document.createElement('div');
      panel.setAttribute('role', 'tabpanel');
      panel.id = `insights-panel-${tabs[idx].id}`;
      panel.setAttribute('aria-labelledby', `insights-tab-${tabs[idx].id}`);
      panel.appendChild(tabs[idx].render());
      panelHost.appendChild(panel);

      if (!find) return;
      const repl = replField.querySelector('input').value;
      const limit = (fieldField.querySelector('input').value || '').trim();
      const cs = caseCb.checked;

// Phase 8 — passphrase-encrypted token storage via crypto.subtle.
// AES-GCM (256-bit) with PBKDF2(SHA-256, 310,000 iterations). DESIGN_SPEC §14.3.

(function () {
  'use strict';

  if (globalThis.GitCiteCrypto) return;

  const ITERATIONS = 310_000;

  async function deriveKey(passphrase, salt) {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      'raw',
      enc.encode(passphrase),
      { name: 'PBKDF2' },
      false,
      ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: ITERATIONS, hash: 'SHA-256' },
      baseKey,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );
  }

  async function encrypt(plaintext, passphrase) {
    const enc = new TextEncoder();
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(passphrase, salt);
    const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plaintext));
    return { salt: Array.from(salt), iv: Array.from(iv), ct: Array.from(new Uint8Array(ct)) };
  }

  async function decrypt({ salt, iv, ct }, passphrase) {
    const key = await deriveKey(passphrase, new Uint8Array(salt));
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(iv) }, key, new Uint8Array(ct));
    return new TextDecoder().decode(pt);
  }

  globalThis.GitCiteCrypto = { encrypt, decrypt, ITERATIONS };
})();
</script>

// Phase 8 — localhost git bridge probe + commit. DESIGN_SPEC §14.4.
// HOTSPOT H14: silent on probe failure (user didn't ask). Mid-session
// success announces ONCE through polite region; never auto-focuses.

(function () {
  'use strict';

  if (globalThis.GitCiteLocalBridge) return;

  const PROBE_TIMEOUT = 500;

  async function probe(url) {
    if (!url) return null;
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), PROBE_TIMEOUT);
      const r = await fetch(url + '/status', { signal: ctrl.signal });
      clearTimeout(t);
      if (!r.ok) return null;
      return await r.json();
    } catch (_) {
      return null;
    }
  }

  async function commit(url, payload) {
    const r = await fetch(url + '/commit', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!r.ok) {
      const txt = await r.text().catch(() => '');
      throw new Error(`bridge commit failed: ${r.status} ${txt}`);
    }
    return r.json();
  }

  let _pollHandle = null;
  function startMidSessionPolling(url, onAvailable) {
    if (_pollHandle) clearInterval(_pollHandle);
    _pollHandle = setInterval(async () => {
      const status = await probe(url);
      if (status) {
        clearInterval(_pollHandle);
        _pollHandle = null;
        if (globalThis.GitCiteAnnounce) {
          globalThis.GitCiteAnnounce.polite('Local git option now available');
        }
        if (typeof onAvailable === 'function') onAvailable(status);
      }
    }, 5_000);
  }

  globalThis.GitCiteLocalBridge = { probe, commit, startMidSessionPolling };
})();
</script>

// Phase 10 — save flow. DESIGN_SPEC §14.5.
// PUT /repos/{owner}/{repo}/contents/{path}; on 409 / sha mismatch the
// conflict dialog drives the user. 422 (branch protection) → branch-PR.
// 403 (read-only) → fork-PR. localhost path uses GitCite Local Bridge.

(function () {
  'use strict';

  if (globalThis.GitCiteSave) return;

  const API = 'https://api.github.com';

  function b64encode(str) {
    if (typeof btoa !== 'undefined') {
      try { return btoa(unescape(encodeURIComponent(str))); } catch (_) {}
    }
    return Buffer.from(str, 'utf-8').toString('base64');
  }

  async function getRemoteSha({ token, repo, branch, path }) {
    const r = await fetch(`${API}/repos/${repo}/contents/${path}?ref=${branch}`, {
      headers: token ? { authorization: `Bearer ${token}` } : {},
    });
    if (r.status === 404) return null;
    if (!r.ok) throw Object.assign(new Error('GET contents failed: ' + r.status), { status: r.status });
    const data = await r.json();
    return data.sha;
  }

  async function putContents({ token, repo, branch, path, content, message, sha }) {
    const r = await fetch(`${API}/repos/${repo}/contents/${path}`, {
      method: 'PUT',
      headers: {
        authorization: `Bearer ${token}`,
        accept: 'application/vnd.github+json',
        'content-type': 'application/json',
      },
      body: JSON.stringify({ message, content: b64encode(content), branch, sha: sha || undefined }),
    });
    const data = await r.json().catch(() => ({}));
    if (r.status === 422) throw Object.assign(new Error('Branch protected'), { status: 422, data });
    if (r.status === 403) throw Object.assign(new Error('Read-only access'), { status: 403, data });
    if (r.status === 409 || r.status === 422 || (r.status === 412)) throw Object.assign(new Error('Sha mismatch'), { status: 409, data });
    if (!r.ok) throw Object.assign(new Error('PUT contents failed: ' + r.status), { status: r.status, data });
    return data;
  }

  async function save({ model, credentials, message, signal }) {
    const cfg = (globalThis.GITCITE_CONFIG || {}).github || {};
    const token = credentials.token;
    const repo = credentials.repo || cfg.repo;
    const branch = cfg.branch;
    const path = cfg.path;
    const text = model.serialise();
    const remoteSha = await getRemoteSha({ token, repo, branch, path });
    if (model.meta.baseSha && remoteSha && remoteSha !== model.meta.baseSha) {
      const e = new Error('Remote changed since last sync');
      e.status = 409;
      e.data = { remoteSha, baseSha: model.meta.baseSha };
      throw e;
    }
    const result = await putContents({ token, repo, branch, path, content: text, message, sha: remoteSha });
    return { sha: result.commit?.sha || result.content?.sha, htmlUrl: result.commit?.html_url };
  }

  globalThis.GitCiteSave = { save, getRemoteSha, putContents };
})();

// Phase 10 — PR fallback. DESIGN_SPEC §14.5.
//   422 (protected branch)        → branch-and-PR
//   403 (read-only collaborator)  → fork-and-PR
//   localhost rejected push       → bridge prints PR-create URL

(function () {
  'use strict';

  if (globalThis.GitCitePRFallback) return;

  const API = 'https://api.github.com';

  async function api(path, { method = 'GET', token, body } = {}) {
    const r = await fetch(API + path, {
      method,
      headers: {
        accept: 'application/vnd.github+json',
        authorization: `Bearer ${token}`,
        'content-type': 'application/json',
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!r.ok) {
      const txt = await r.text().catch(() => '');
      throw new Error(`${path} → ${r.status} ${txt}`);
    }
    return r.json();
  }

  async function branchAndPR({ token, repo, branch, path, content, message }) {
    // Get base ref sha
    const baseRef = await api(`/repos/${repo}/git/ref/heads/${branch}`, { token });
    const newBranch = `gitcite/save-${Date.now()}`;
    await api(`/repos/${repo}/git/refs`, { method: 'POST', token, body: { ref: `refs/heads/${newBranch}`, sha: baseRef.object.sha } });
    const enc = (typeof btoa !== 'undefined') ? btoa(unescape(encodeURIComponent(content))) : Buffer.from(content, 'utf-8').toString('base64');
    await api(`/repos/${repo}/contents/${path}`, { method: 'PUT', token, body: { message, content: enc, branch: newBranch } });
    const pr = await api(`/repos/${repo}/pulls`, { method: 'POST', token, body: { title: message, head: newBranch, base: branch, body: 'Saved via GitCite (branch protection fallback).' } });
    return { number: pr.number, url: pr.html_url, kind: 'branch' };
  }

  async function forkAndPR({ token, repo, branch, path, content, message }) {
    const fork = await api(`/repos/${repo}/forks`, { method: 'POST', token });
    const headRepo = fork.full_name; // e.g. user/repo
    const baseRef = await api(`/repos/${headRepo}/git/ref/heads/${branch}`, { token });
    const newBranch = `gitcite/save-${Date.now()}`;
    await api(`/repos/${headRepo}/git/refs`, { method: 'POST', token, body: { ref: `refs/heads/${newBranch}`, sha: baseRef.object.sha } });
    const enc = (typeof btoa !== 'undefined') ? btoa(unescape(encodeURIComponent(content))) : Buffer.from(content, 'utf-8').toString('base64');
    await api(`/repos/${headRepo}/contents/${path}`, { method: 'PUT', token, body: { message, content: enc, branch: newBranch } });
    const owner = headRepo.split('/')[0];
    const pr = await api(`/repos/${repo}/pulls`, { method: 'POST', token, body: { title: message, head: `${owner}:${newBranch}`, base: branch, body: 'Saved via GitCite (read-only fallback — fork+PR).' } });
    return { number: pr.number, url: pr.html_url, kind: 'fork' };
  }

      'Import .bib, .bibtex, and .csv libraries — by file picker or drag and drop.',
      'Search Semantic Scholar, OpenAlex, and CrossRef by DOI, title, author, or keyword.',
      'Edit citations across many entry types, including @archival sources.',
      'Save changes back to GitHub via OAuth, a personal access token, or a localhost git bridge.',
      'Browse Insights and Stats over your library.',
      'Find and Replace across every field of every citation.',
      'Render Chicago Notes-Bibliography citations and copy them to the clipboard.',
      'Use the app entirely with the keyboard or with a screen reader (WCAG 2.2 AAA).',
    ];
    for (const text of FEATURES) {
      const li = document.createElement('li');
      li.textContent = text;
      features.appendChild(li);
    }
    body.appendChild(features);

    const privacyHeading = document.createElement('h3');
    privacyHeading.textContent = 'Privacy';
    body.appendChild(privacyHeading);

    const table = document.createElement('table');
    const cap = document.createElement('caption');
    cap.textContent = 'Outbound HTTP requests GitCite may make';
    table.appendChild(cap);
    const head = document.createElement('thead');
    const r = document.createElement('tr');
    for (const t of ['Endpoint', 'Trigger', 'Sent']) {
      const th = document.createElement('th');
      th.scope = 'col';
      th.textContent = t;
      r.appendChild(th);
    }
    head.appendChild(r);
    table.appendChild(head);

    const tbody = document.createElement('tbody');
    for (const row of ROWS) {
      const tr = document.createElement('tr');
      for (const c of row) {
        const td = document.createElement('td');
        td.textContent = c;
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    body.appendChild(table);
  }

  globalThis.GitCiteAbout = { open };
})();
</script>
  <script>
// Phase 1.A — theme switcher. Reads localStorage for "gitcite:theme",
// applies data-theme on <html>, mounts a real <button> in the header.
// Pre-paint application happens in src/a11y/theme-bootstrap.js (inline
// in <head>) so there is no flash on initial load.

(function () {
  'use strict';

  const STORAGE_KEY = 'gitcite:theme';

  function readPref() {
    try {
      const v = localStorage.getItem(STORAGE_KEY);
      if (v === 'light' || v === 'dark') return v;
    } catch (_) {}
    return null;
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
  }

  function persistTheme(theme) {
    try { localStorage.setItem(STORAGE_KEY, theme); } catch (_) {}
  }

  function currentTheme() {
    return document.documentElement.getAttribute('data-theme') || 'light';
  }

  function toggleTheme() {
    const next = currentTheme() === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    persistTheme(next);
    updateButton(next);
  }

  function updateButton(theme) {
    const btn = document.querySelector('[data-theme-toggle]');
    if (!btn) return;
    const next = theme === 'dark' ? 'light' : 'dark';
    btn.setAttribute('aria-label', `Switch to ${next} theme`);
    btn.textContent = theme === 'dark' ? 'Light theme' : 'Dark theme';
  }

  function mountToggle() {
    // Phase 18 #4 — header theme toggle removed. The theme is now chosen
    // exclusively from Settings → Theme, so we no longer mount a header
    // button. The `apply` / `persist` / `read` API stays public for the
    // pre-paint bootstrap and the settings dialog. If any deployment
    // wants to re-add a header button, they can render it themselves and
    // call GitCiteTheme.toggle().
  }

  // Public API for tests and later phases.
  globalThis.GitCiteTheme = {
    apply: applyTheme,
    persist: persistTheme,
    current: currentTheme,
    toggle: toggleTheme,
    read: readPref,
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', mountToggle);
  } else {
    mountToggle();
  }
})();
</script>
  <script>
// Phase 17 #8 — Settings dialog.
//
// Four sections, all autosaved to localStorage so preferences persist
// across reloads:
//
//   1. Account     — current GitHub sign-in status + a button that
//                    opens the existing auth modal (PAT / OAuth / local).
//   2. Theme       — Light / Dark / System (System honours the OS via
//                    prefers-color-scheme; updates instantly).
//   3. Library columns       — show/hide + reorder (Up/Down buttons),
//                              consumed by src/views/grid.js.
//   4. Default add-citation fields — show/hide + reorder, consumed by
//                                    src/views/edit-form.js.
//
// Reorder pattern: per the Apex4X "Drag" template, items are
// reorderable; the accessible substitute is two buttons per item (Move
// up / Move down). Apex's "grab + arrow + drop" model is implemented as
// a bonus: Space toggles "picked up" mode, then ArrowUp/ArrowDown moves
// the item, Space or Enter drops it. The buttons remain available for
// users who don't want the toggle interaction. WCAG 2.5.7 (Dragging
// Movements) is met by the Up/Down buttons; 2.1.1 by the keyboard
// model; 4.1.2 by aria-pressed on the grab toggle.

(function () {
  'use strict';

  if (globalThis.GitCiteSettings) return;

  const STORAGE = {
    theme: 'gitcite.settings.theme',           // 'light' | 'dark' | 'system'
    columns: 'gitcite.settings.columns',       // JSON: [{key, visible}]
    fields: 'gitcite.settings.defaultFields',  // JSON: [{name, visible}]
  };

  // Phase 18 #2 — single shared registry of citation-related items.
  // Library columns AND Default add-citation fields both pick from this
  // list, so adding/removing an item in one place naturally exposes it
  // in the other. Each item has independent default visibility for
  // each surface (`columnDefault` / `fieldDefault`) plus an optional
  // `field` flag — when false, the item is column-only (e.g., the
  // virtual "saved" status, which has no underlying BibTeX field).
  // NB: the reorderable list keys on `name`, so all entries must share
  // that property name.
  const REGISTRY = [
    { name: 'key',        label: 'Citation key', columnDefault: false, fieldDefault: true,  field: true },
    { name: 'type',       label: 'Entry type',   columnDefault: true,  fieldDefault: false, field: false },
    { name: 'title',      label: 'Title',        columnDefault: true,  fieldDefault: true,  field: true },
    { name: 'author',     label: 'Authors',      columnDefault: true,  fieldDefault: true,  field: true },
    { name: 'year',       label: 'Year',         columnDefault: true,  fieldDefault: true,  field: true },
    { name: 'journal',    label: 'Journal',      columnDefault: false, fieldDefault: true,  field: true },
    { name: 'booktitle',  label: 'Book title',   columnDefault: false, fieldDefault: false, field: true },
    { name: 'volume',     label: 'Volume',       columnDefault: false, fieldDefault: false, field: true },
    { name: 'number',     label: 'Number',       columnDefault: false, fieldDefault: false, field: true },
    { name: 'pages',      label: 'Pages',        columnDefault: false, fieldDefault: false, field: true },
    { name: 'edition',    label: 'Edition',      columnDefault: false, fieldDefault: false, field: true },
    { name: 'publisher',  label: 'Publisher',    columnDefault: false, fieldDefault: false, field: true },
    { name: 'address',    label: 'Address',      columnDefault: false, fieldDefault: false, field: true },
    { name: 'doi',        label: 'DOI',          columnDefault: false, fieldDefault: true,  field: true },
    { name: 'isbn',       label: 'ISBN',         columnDefault: false, fieldDefault: false, field: true },
    { name: 'url',        label: 'URL',          columnDefault: false, fieldDefault: false, field: true },
    { name: 'abstract',   label: 'Abstract',     columnDefault: false, fieldDefault: false, field: true },
    { name: 'jel',        label: 'JEL code',     columnDefault: false, fieldDefault: false, field: true },
    { name: 'lcc',        label: 'LCC class',    columnDefault: false, fieldDefault: false, field: true },
    { name: 'note',       label: 'Note',         columnDefault: false, fieldDefault: false, field: true },
    { name: 'datasource', label: 'Datasource',   columnDefault: true,  fieldDefault: false, field: false },
    { name: 'saved',      label: 'Saved',        columnDefault: true,  fieldDefault: false, field: false },
  ];

  // Build per-surface defaults from REGISTRY. Both surfaces use `name`
  // as the row id (was `key`/`name` split before Phase 18).
  const DEFAULT_COLUMNS = REGISTRY.map((r) => ({ name: r.name, label: r.label, visible: r.columnDefault }));
  const DEFAULT_FIELDS = REGISTRY
    .filter((r) => r.field)
    .map((r) => ({ name: r.name, label: r.label, visible: r.fieldDefault }));

  function readJSON(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return fallback;
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return fallback;
      return parsed;
    } catch (_) { return fallback; }
  }
  function writeJSON(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (_) {}
  }

  // Merge stored prefs with defaults so a new column / field added by a
  // future release becomes visible without the user re-doing settings.
  function mergePrefs(stored, defaults, idKey) {
    const seen = new Set();
    const out = [];
    for (const s of stored) {
      const def = defaults.find((d) => d[idKey] === s[idKey]);
      if (!def) continue;
      out.push({ ...def, visible: !!s.visible });
      seen.add(s[idKey]);
    }
    for (const d of defaults) {
      if (!seen.has(d[idKey])) out.push({ ...d });
    }
    return out;
  }

  function getColumns() {
    const stored = readJSON(STORAGE.columns, null);
    if (!stored) return DEFAULT_COLUMNS.slice();
    // Phase 18 #2 — migrate legacy stored entries that used `key` as
    // the id to the unified `name` field. Older preferences also used
    // `authors` as the columns id; map it back to `author`.
    const migrated = stored.map((s) => {
      const id = s.name || s.key;
      const remap = id === 'authors' ? 'author' : id;
      return { name: remap, visible: !!s.visible };
    });
    return mergePrefs(migrated, DEFAULT_COLUMNS, 'name');
  }
  function setColumns(cols) { writeJSON(STORAGE.columns, cols); }
  function getFields() {
    const stored = readJSON(STORAGE.fields, null);
    if (!stored) return DEFAULT_FIELDS.slice();
    return mergePrefs(stored, DEFAULT_FIELDS, 'name');
  }
  function setFields(fields) { writeJSON(STORAGE.fields, fields); }

  function getTheme() {
    try { return localStorage.getItem(STORAGE.theme) || 'system'; }
    catch (_) { return 'system'; }
  }
  function setTheme(theme) {
    try { localStorage.setItem(STORAGE.theme, theme); } catch (_) {}
    applyTheme(theme);
  }
  function applyTheme(theme) {
    if (typeof document === 'undefined') return;
    if (theme === 'system') {
      // Resolve via prefers-color-scheme so the existing data-theme
      // attribute (which the rest of the CSS reads) reflects the OS.
      let resolved = 'light';
      try {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          resolved = 'dark';
        }
      } catch (_) {}
      document.documentElement.setAttribute('data-theme', resolved);
    } else {
      document.documentElement.setAttribute('data-theme', theme);
    }
  }

  // ---- Apex-style reorderable list ----------------------------------
  // Items: [{ id, label, visible }]. onChange is called with the new
  // ordered list every time a reorder or visibility toggle happens.
  function reorderableList(items, opts) {
    opts = opts || {};
    const ariaLabel = opts.ariaLabel || 'Reorderable list';
    const wrap = document.createElement('div');
    wrap.setAttribute('role', 'list');
    wrap.setAttribute('aria-label', ariaLabel);
    // Phase 17 a11y-review m1 — only set aria-describedby when truthy.
    // An empty value is invalid ARIA and some AT log warnings.
    if (opts.describedBy) wrap.setAttribute('aria-describedby', opts.describedBy);
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:0.25rem;border:1px solid var(--border);border-radius:4px;padding:0.5rem;';

    let state = items.slice();
    let grabbedIndex = -1;

    function fire() {
      if (typeof opts.onChange === 'function') opts.onChange(state.slice());
    }

    function render() {
      wrap.innerHTML = '';
      state.forEach((item, i) => {
        const row = document.createElement('div');
        row.setAttribute('role', 'listitem');
        row.setAttribute('data-item-id', item.id);
        row.setAttribute('data-pos', String(i));
        row.style.cssText = 'display:flex;flex-wrap:wrap;align-items:center;gap:0.5rem;padding:0.25rem;border:1px solid transparent;border-radius:4px;';
        if (i === grabbedIndex) {
          row.style.background = 'var(--bg-elevated)';
          row.style.borderColor = 'var(--focus-ring)';
        }

        // Drag handle / grab toggle (Apex grab pattern).
        const grab = document.createElement('button');
        grab.type = 'button';
        grab.setAttribute('data-grab', '');
        grab.setAttribute('aria-pressed', i === grabbedIndex ? 'true' : 'false');
        grab.setAttribute('aria-label', i === grabbedIndex
          ? `Drop ${item.label} (position ${i + 1} of ${state.length})`
          : `Move ${item.label} — Space to pick up, then arrow keys to position, Space to drop`);
        grab.textContent = i === grabbedIndex ? 'Drop' : 'Grab';
        grab.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
        grab.addEventListener('click', () => toggleGrab(i));
        grab.addEventListener('keydown', (e) => {
          if (i !== grabbedIndex) return;
          if (e.key === 'ArrowUp') { e.preventDefault(); move(i, i - 1); }
          else if (e.key === 'ArrowDown') { e.preventDefault(); move(i, i + 1); }
          else if (e.key === 'Escape') { e.preventDefault(); cancelGrab(); }
        });
        row.appendChild(grab);

        // Visibility checkbox.
        const cbId = `pref-vis-${ariaLabel.replace(/\s+/g, '-')}-${item.id}`;
        const cbLabel = document.createElement('label');
        cbLabel.setAttribute('for', cbId);
        cbLabel.style.cssText = 'display:inline-flex;align-items:center;gap:0.25rem;min-block-size:44px;';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.id = cbId;
        cb.checked = !!item.visible;
        cb.setAttribute('data-vis-toggle', '');
        cb.style.cssText = 'min-block-size:24px;min-inline-size:24px;';
        cb.addEventListener('change', () => {
          state[i].visible = cb.checked;
          fire();
          // Phase 17 a11y-review M4 — announce so SR users get parity
          // with Move / Drop / Theme actions. The throttle is per
          // exact-text so toggling different items is not suppressed.
          if (globalThis.GitCiteAnnounce) {
            globalThis.GitCiteAnnounce.polite(`${item.label} ${cb.checked ? 'shown' : 'hidden'}`);
          }
        });
        cbLabel.appendChild(cb);
        // Phase 18 #3 — checkbox label includes the item name so each
        // toggle has a unique accessible name. The previous "Show" was
        // identical for every row (WCAG 2.5.3 / 4.1.2 violation: a list
        // of "Show / Show / Show" checkboxes can't be distinguished by
        // screen-reader users navigating by form-control list).
        cbLabel.appendChild(document.createTextNode(` Show ${item.label}`));
        row.appendChild(cbLabel);

        // Up / Down buttons (the always-available keyboard substitute).
        const up = document.createElement('button');
        up.type = 'button';
        up.setAttribute('data-move-up', '');
        up.setAttribute('aria-label', `Move ${item.label} up`);
        up.textContent = 'Move up';
        up.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
        up.disabled = i === 0;
        up.addEventListener('click', () => move(i, i - 1));
        row.appendChild(up);

        const down = document.createElement('button');
        down.type = 'button';
        down.setAttribute('data-move-down', '');
        down.setAttribute('aria-label', `Move ${item.label} down`);
        down.textContent = 'Move down';
        down.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
        down.disabled = i === state.length - 1;
        down.addEventListener('click', () => move(i, i + 1));
        row.appendChild(down);

        wrap.appendChild(row);
      });
    }

    function toggleGrab(i) {
      if (grabbedIndex === i) {
        if (globalThis.GitCiteAnnounce) globalThis.GitCiteAnnounce.polite(`${state[i].label} dropped at position ${i + 1}`);
        grabbedIndex = -1;
      } else {
        grabbedIndex = i;
        if (globalThis.GitCiteAnnounce) globalThis.GitCiteAnnounce.polite(`${state[i].label} grabbed. Use arrow keys to move, Space to drop.`);
      }
      render();
      const sel = wrap.querySelector(`[data-pos="${grabbedIndex >= 0 ? grabbedIndex : i}"] [data-grab]`);
      if (sel) try { sel.focus(); } catch (_) {}
    }

    function cancelGrab() {
      grabbedIndex = -1;
      render();
    }

    function move(from, to) {
      if (to < 0 || to >= state.length || from === to) return;
      const [it] = state.splice(from, 1);
      state.splice(to, 0, it);
      // Track the moved item so focus stays with it after rerender.
      if (grabbedIndex === from) grabbedIndex = to;
      render();
      // Phase 17 a11y-review M3 — restore focus intelligently. When the
      // grab toggle is the active control, refocus it. Otherwise prefer
      // the same-direction button the user pressed; if that button is
      // disabled at the new position (we hit the top with Move-up or the
      // bottom with Move-down), fall back to the OPPOSITE direction
      // button on the same row so the user is still on a button of the
      // same kind ("Move ...") rather than being teleported to "Grab".
      let focusBtn;
      if (grabbedIndex === to) {
        focusBtn = wrap.querySelector(`[data-pos="${to}"] [data-grab]`);
      } else {
        const sameDir = to > from ? 'down' : 'up';
        const oppDir  = to > from ? 'up'   : 'down';
        const same = wrap.querySelector(`[data-pos="${to}"] [data-move-${sameDir}]`);
        const opp  = wrap.querySelector(`[data-pos="${to}"] [data-move-${oppDir}]`);
        focusBtn = (same && !same.disabled) ? same : (opp && !opp.disabled) ? opp : null;
      }
      if (focusBtn) try { focusBtn.focus(); } catch (_) {}
      else {
        const grab = wrap.querySelector(`[data-pos="${to}"] [data-grab]`);
        if (grab) try { grab.focus(); } catch (_) {}
      }
      if (globalThis.GitCiteAnnounce) {
        globalThis.GitCiteAnnounce.polite(`${it.label} moved to position ${to + 1} of ${state.length}`);
      }
      fire();
    }

    render();
    return { wrap, getState: () => state.slice(), setState: (s) => { state = s.slice(); render(); } };
  }

  // ---- Sections -----------------------------------------------------
  function sectionAccount(body) {
    const sec = document.createElement('section');
    sec.setAttribute('aria-labelledby', 'settings-account-h');
    const h = document.createElement('h3');
    h.id = 'settings-account-h';
    h.textContent = 'Account';
    h.style.cssText = 'margin:0 0 0.5rem;';
    sec.appendChild(h);

    const status = document.createElement('p');
    status.style.cssText = 'margin:0 0 0.5rem;';
    let signedIn = false;
    try {
      // The auth-toggle exposes the current state via its host element,
      // but we can't query its private state. Best-effort: check known
      // localStorage keys used by the GitHub auth flow.
      signedIn = !!(localStorage.getItem('gitcite.github.token')
        || localStorage.getItem('gitcite.github.pat')
        || localStorage.getItem('gitcite.auth'));
    } catch (_) {}
    status.textContent = signedIn
      ? 'Signed in to GitHub. Save Changes will push to your repository.'
      : 'Not signed in. Connect a GitHub account to push library updates.';
    sec.appendChild(status);

    const signBtn = document.createElement('button');
    signBtn.type = 'button';
    signBtn.setAttribute('data-settings-sign-in', '');
    signBtn.textContent = signedIn ? 'Manage GitHub sign-in' : 'Sign in to GitHub';
    signBtn.style.cssText = 'min-block-size:44px;min-inline-size:44px;';
    signBtn.addEventListener('click', () => {
      if (globalThis.GitCiteAuthModal && typeof globalThis.GitCiteAuthModal.open === 'function') {
        globalThis.GitCiteAuthModal.open({});
      }
    });
    sec.appendChild(signBtn);

    body.appendChild(sec);
  }

  function sectionTheme(body) {
    const sec = document.createElement('section');
    sec.setAttribute('aria-labelledby', 'settings-theme-h');
    sec.style.cssText = 'margin-block-start:1rem;';
    const h = document.createElement('h3');
    h.id = 'settings-theme-h';
    h.textContent = 'Theme';
    h.style.cssText = 'margin:0 0 0.5rem;';
    sec.appendChild(h);

    const fs = document.createElement('fieldset');
    fs.style.cssText = 'border:1px solid var(--border);border-radius:4px;padding:0.5rem;';
    const lg = document.createElement('legend');
    lg.textContent = 'Choose theme';
    lg.style.cssText = 'padding:0 0.25rem;';
    fs.appendChild(lg);

    const current = getTheme();
    for (const opt of [
      { v: 'light',  l: 'Light' },
      { v: 'dark',   l: 'Dark' },
      { v: 'system', l: 'System (match operating system)' },
    ]) {
      const id = `settings-theme-${opt.v}`;
      const lab = document.createElement('label');
      lab.setAttribute('for', id);
      lab.style.cssText = 'display:flex;align-items:center;gap:0.5rem;min-block-size:44px;';
      const r = document.createElement('input');
      r.type = 'radio';
      r.name = 'settings-theme';
      r.id = id;
      r.value = opt.v;
      r.checked = current === opt.v;
      r.setAttribute('data-settings-theme-radio', '');
      r.addEventListener('change', () => {
        if (r.checked) {
          setTheme(opt.v);
          if (globalThis.GitCiteAnnounce) globalThis.GitCiteAnnounce.polite(`Theme set to ${opt.l}`);
        }
      });
      lab.appendChild(r);
      lab.appendChild(document.createTextNode(opt.l));
      fs.appendChild(lab);
    }
    sec.appendChild(fs);
    body.appendChild(sec);
  }

  function sectionColumns(body) {
    const sec = document.createElement('section');
    sec.setAttribute('aria-labelledby', 'settings-cols-h');
    sec.style.cssText = 'margin-block-start:1rem;';
    const h = document.createElement('h3');
    h.id = 'settings-cols-h';
    h.textContent = 'Library columns';
    h.style.cssText = 'margin:0 0 0.5rem;';
    sec.appendChild(h);

    const help = document.createElement('p');
    help.id = 'settings-cols-help';
    help.style.cssText = 'margin:0 0 0.5rem;color:var(--fg-muted);font-size:0.875rem;';
    help.textContent = 'Pick which columns appear in the library table and the order they appear in.';
    sec.appendChild(help);

    const list = reorderableList(getColumns().map((c) => ({ id: c.name, label: c.label, visible: c.visible })), {
      ariaLabel: 'Library columns',
      describedBy: 'settings-cols-help',
      onChange: (state) => {
        const persisted = state.map((s) => ({ name: s.id, label: s.label, visible: s.visible }));
        setColumns(persisted);
        // Live re-render so the user sees their change immediately.
        if (globalThis.GitCiteApp && globalThis.GitCiteApp.applyColumnPrefs) {
          globalThis.GitCiteApp.applyColumnPrefs();
        }
      },
    });
    sec.appendChild(list.wrap);
    body.appendChild(sec);
  }

  function sectionFields(body) {
    const sec = document.createElement('section');
    sec.setAttribute('aria-labelledby', 'settings-fields-h');
    sec.style.cssText = 'margin-block-start:1rem;';
    const h = document.createElement('h3');
    h.id = 'settings-fields-h';
    h.textContent = 'Default fields on the Add citation form';
    h.style.cssText = 'margin:0 0 0.5rem;';
    sec.appendChild(h);

    const help = document.createElement('p');
    help.id = 'settings-fields-help';
    help.style.cssText = 'margin:0 0 0.5rem;color:var(--fg-muted);font-size:0.875rem;';
    help.textContent = 'Pick which fields are visible by default when you open the Add citation form. Hidden fields are still available via the form’s "More fields" disclosure.';
    sec.appendChild(help);

    const list = reorderableList(getFields().map((f) => ({ id: f.name, label: f.label, visible: f.visible })), {
      ariaLabel: 'Default add-citation fields',
      describedBy: 'settings-fields-help',
      onChange: (state) => {
        const persisted = state.map((s) => ({ name: s.id, label: s.label, visible: s.visible }));
        setFields(persisted);
      },
    });
    sec.appendChild(list.wrap);
    body.appendChild(sec);
  }

  function open() {
    const Dialog = globalThis.GitCiteDialog;
    if (!Dialog) return null;
    const handle = Dialog.open({
      title: 'Settings',

  const APP_NAME = 'GitCite';

    const next = viewName ? `${viewName} – ${APP_NAME}` : APP_NAME;

  // Phase 17 #10 — mark the toolbar entry corresponding to the active

  // function can call setActiveView('library') / 'add-citation' /
  // 'reload-library' once per render.

  // into <main>, it stamped role="region" aria-label="Library import" onto

  // mount and removes those carry-over attributes; the per-view code is
  // free to set its own region semantics afterward.

    main.removeAttribute('aria-labelledby');

    Pill.update({ count: items.length, items });

    }

    // so a burst of edits coalesces into one write. Only runs when there
    // is a handle and the model has dirty/deleted entries.
    scheduleAutoSave();

      model.deleted.clear();

      // auto-save (no dirty entries → scheduleAutoSave no-ops).
      const items = [];
      Pill.update({ count: items.length, items });
      if (globalThis.GitCiteSaveButton) globalThis.GitCiteSaveButton.update({ count: 0 });
      const nav = document.querySelector('nav');
      if (nav && !nav.hidden) mountSidebarActions(nav);
      if (Announce && Announce.polite) Announce.polite(`Saved to ${_libraryName || 'library file'}`);
      return true;
    } catch (e) {

  function setupPill() {

  }

  function setupHeaderToolbar() {
    const host = document.querySelector('[data-toolbar-host]');
    if (!host || !globalThis.GitCiteHeaderToolbar) return;
    const empty = model.entries.length === 0;
    const items = [
      { id: 'library', label: 'Library' },
      { id: 'add-citation', label: 'Add citation manually', title: 'Type fields directly into a blank entry form.' },
      { id: 'search-providers', label: 'Search providers', title: 'Search Semantic Scholar, OpenAlex, or CrossRef.' },
      // Phase 16 #1 — Find/Replace is meaningless on an empty library;
      // start disabled and let refreshList() flip the state when entries

      // are not actionable, so screen readers announce the precondition.
      { id: 'find-replace', label: 'Find / Replace', disabled: empty },
      // Phase 17 #2 — Insights is meaningless on an empty library
      // (every panel reads from model.entries). Same gating pattern as
      // Find / Replace.
      // Phase 17 #12 — Stats removed. The previous toolbar exposed both
      // Insights and Stats but they invoked the same modal. Insights
      // already covers Overview / Citation Age / Authors / Venues /
      // JEL / Quality, so the redundant Stats button is dropped.
      { id: 'insights', label: 'Insights', disabled: empty },
      // Phase 17 #8 — Settings entry point. Always available so a user
      // arriving at an empty library can still configure GitHub auth,

      { id: 'settings', label: 'Settings', title: 'Sign in to GitHub, choose theme, and pick which library columns and add-citation fields to show.' },
      { id: 'shortcuts', label: 'Shortcuts' },
      { id: 'about', label: 'About' },

      // refresh action; the button actually returns to the loader so
      // the user can pick a different .bib / .csv to import.

  function onToolbarAction(id) {
    switch (id) {
      case 'library':
        if (model.entries.length === 0) showEmptyLibrary();
        else renderLibraryView();
        return;
      case 'add-citation':

        // so the user can type in fields directly. The auto-lookup path
        // lives behind "Search providers" (case below).

      case 'search-providers':
        if (globalThis.GitCiteAddSearch) {

          // first so the user can review/finalize fields. The search
          // dialog stays open underneath so when the edit dialog closes
          // the user can pick another result without re-running the

            onPick: (data, ctx) => onPickedResult(data, ctx),

          // Phase 17 a11y-review M2 — REPLACE _criteria, don't merge.

      // mutate('add') so the unsaved-changes pill increments and Save

      let imported = 0;
      let skipped = 0;
      for (const e of result.entries) {

        model.mutate(e, 'add');

    // the next filter-count announcement so SR users don't hear "N match
    // your filters" right after they imported (no filter ran).
    _suppressFilterAnnounce = true;
    if (Announce && Announce.polite && !isAutoLoad) {

    }

  }

  let _criteria = {};
  // Phase 16 #11 — refreshList suppresses the filter-count announcement
  // when nothing is filtering. Set this flag to also suppress it for one
  // refresh cycle right after an import, so the only thing announced is
  // "N entries imported" via the explicit polite call.
  let _suppressFilterAnnounce = false;

  function renderLibraryView() {
    const main = resetMainRegion();
    const nav = document.querySelector('nav');
    const aside = document.querySelector('aside');
    if (!main) return;

    setViewTitle('Library');
    setActiveView('library');

    // Phase 14 B.2 / a11y-review (Critical 2) — every view's first
    // heading inside <main> is an H1. Uses the "focusable visually
    // hidden" pattern: clipped by default, expanded to readable size
    // while focused so screen readers reliably announce on skip-link
    // activation in browsers that struggle with clip:rect on focus.
    const h1 = document.createElement('h1');
    h1.id = 'library-heading';
    h1.textContent = 'Library';
    h1.setAttribute('tabindex', '-1');
    h1.className = 'gitcite-sr-h1';
    main.appendChild(h1);

    const layout = document.createElement('div');
    layout.style.cssText = 'display:grid;grid-template-rows:auto 1fr;gap:0.5rem;height:80vh;';

    layout.appendChild(searchSlot);

    // grid mounts its own overflow:auto scrollHost; nesting two scrollers
    // means the outer captures user scroll while the grid's virtualization
    // sees scrollTop=0 forever and only ever renders the first window.
    const listSlot = document.createElement('div');
    listSlot.style.cssText = 'min-height:0;height:100%;';
    layout.appendChild(listSlot);

    main.appendChild(layout);
