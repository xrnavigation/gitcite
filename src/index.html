    AAA conformance ledger (DESIGN_SPEC §19). Each row is updated by the PR

    | 2.2.3   | open   | 9         | OAuth device flow no-app-timeout

    | 2.3.3   | open   | 1.A       | prefers-reduced-motion plumbing
    | 2.4.10  | met    | 0         | Single H1, landmark structure
    | 2.4.11  | open   | 1.B       | Focus appearance / not obscured
    | 2.4.13  | open   | 1.A, 1.B  | >=2 CSS px focus ring, >=3:1 contrast
    | 2.5.5   | open   | 1.H       | 44x44 hit-area utility + audit
    | 3.1.1   | met    | 0         | <html lang="en">
    | 3.1.3   | open   | 1.G       | Glossary/<abbr> on first use
    | 3.1.4   | open   | 1.G       | <abbr title> for abbreviations
    | 3.1.5   | open   | 1.G, 11   | Reading-level review of UI copy
    | 3.2.5   | open   | 14, 15    | Auto-pull/auto-load gated on prefs
    | 3.3.5   | open   | 1.F       | Shortcuts modal + glossary tooltips
    | 3.3.6   | open   | 10        | Save flows reversible; typed confirm
  -->
